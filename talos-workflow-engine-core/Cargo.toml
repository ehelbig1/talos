[package]
name = "talos-workflow-engine-core"
version = "0.3.0"
edition = "2021"
rust-version = "1.88"
description = "Core data model and traits for a portable workflow execution engine (DAG, edges, retry/join/system-node taxonomy)."
license = "MIT OR Apache-2.0"
readme = "README.md"
keywords = ["workflow", "engine", "dag", "executor", "async"]
categories = ["asynchronous", "data-structures"]
repository = "https://github.com/aegix-dev/talos-workflow-engine"
homepage = "https://github.com/aegix-dev/talos-workflow-engine"

[dependencies]
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["serde", "v4"] }

[features]
default = ["llm-primitives"]
# Enables LLM/agent-specific `SystemNodeKind` variants:
# `Judge`, `InlineJudge`, `Ensemble`, `LlmDispatch`, `AgentLoop`,
# `ReActLoop`, `ReflectiveRetry`, `ConfidenceGate`.
#
# Disabling this leaves the taxonomy at generic workflow primitives
# (loops, fan-in/out, waits, sub-workflows, verification, dynamic
# dispatch). Consumers who don't orchestrate LLM workflows can drop
# the feature to remove the variants from docs + binary output.
llm-primitives = []

[lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"
unreachable_pub = "deny"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
# Pragmatic carve-outs for a data-model crate: these fire on patterns
# that are fine in application code and would be noise to silence per-site.
module_name_repetitions = "allow"
missing_errors_doc = "allow"
must_use_candidate = "allow"
