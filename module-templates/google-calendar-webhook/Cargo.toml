[package]
name = "google-calendar-webhook"
version = "0.1.0"
edition = "2021"

[dependencies]
wit-bindgen-rt = { version = "0.44.0", features = ["bitflags"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
talos_sdk_macros = { path = "../../talos_sdk_macros" }

[lib]
crate-type = ["cdylib"]
path = "template.rs"

[package.metadata.component]
package = "talos:google-calendar-webhook"

[package.metadata.component.target]
path = "../../wit/talos.wit"
world = "network-node"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true


[workspace]
