talos-module-executions = { path = "../talos-module-executions" }
talos-registry = { path = "../talos-registry" }
talos-secrets-manager = { path = "../talos-secrets-manager" }
talos-worker-fleet = { path = "../talos-worker-fleet" }
talos-workflow-engine-core = { path = "../talos-workflow-engine-core" }
talos-workflow-job-protocol = { path = "../talos-workflow-job-protocol" }
talos-workflow-repository = { path = "../talos-workflow-repository" }
