[package]
name = "talos-scheduler"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
anyhow.workspace = true
async-nats = "0.47"
chrono.workspace = true
chrono-tz = "0.10"
