[package]
name = "controller"
version = "1.0.0-r306"
edition = "2021"
# Internal workspace crate — not published to crates.io. License set so
# cargo-deny's unlicensed-crate check passes; no third-party distribution.
publish = false
license = "MIT OR Apache-2.0"

[dependencies]
lru = "0.16.3"
# HTML sanitisation for user-facing rendered output (briefing endpoint).
ammonia = "4"
# Atomic hot-swap for the Pub/Sub JWK cache (gmail::pubsub_jwt).
# Readers never see a half-built map; refresh writes a new Arc.
arc-swap = "1.7"
# Use Axum 0.8 (required by async-graphql‑axum 7.x)
axum = { version = "0.8", features = ["json", "ws"] }
async-graphql = { version = "7.2", features = ["uuid", "chrono", "dataloader"] }
async-graphql-axum = "7.2"
tokio = { version = "1.49", features = ["full"] }
tokio-stream = { version = "0.1", features = ["sync"] }
async-stream = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
uuid = { version = "1.20", features = ["serde", "v4", "v5"] }
talos-workflow-job-protocol = { path = "../talos-workflow-job-protocol" }
talos-dlp = { path = "../talos-dlp" }
talos-secrets = { path = "../talos-secrets" }
talos-memory = { path = "../talos-memory" }
talos-mcp = { path = "../talos-mcp" }
talos-auth-types = { path = "../talos-auth-types" }
talos-actor-types = { path = "../talos-actor-types" }
talos-workflow-types = { path = "../talos-workflow-types" }
talos-auth = { path = "../talos-auth" }
talos-rate-limit = { path = "../talos-rate-limit" }
talos-csrf = { path = "../talos-csrf" }
talos-circuit-breaker = { path = "../talos-circuit-breaker" }
talos-feature-flags = { path = "../talos-feature-flags" }
talos-idempotency = { path = "../talos-idempotency" }
talos-cost-attribution = { path = "../talos-cost-attribution" }
talos-errors = { path = "../talos-errors" }
talos-metrics = { path = "../talos-metrics" }
talos-http-utils = { path = "../talos-http-utils" }
talos-shutdown = { path = "../talos-shutdown" }
talos-tenancy = { path = "../talos-tenancy" }
talos-secrets-rotation = { path = "../talos-secrets-rotation" }
talos-node-cache = { path = "../talos-node-cache" }
talos-db-monitor = { path = "../talos-db-monitor" }
talos-worker-fleet = { path = "../talos-worker-fleet" }
talos-schedule-repo = { path = "../talos-schedule-repo" }
talos-config = { path = "../talos-config" }
talos-config-validator = { path = "../talos-config-validator" }
talos-integration-state = { path = "../talos-integration-state" }
talos-system-repo = { path = "../talos-system-repo" }
talos-api-keys = { path = "../talos-api-keys" }
talos-graph-rag = { path = "../talos-graph-rag" }
talos-security-headers = { path = "../talos-security-headers" }
talos-retry-intelligence = { path = "../talos-retry-intelligence" }
talos-capability-world = { path = "../talos-capability-world" }
talos-jobs = { path = "../talos-jobs" }
talos-replay-diff = { path = "../talos-replay-diff" }
talos-replay-service = { path = "../talos-replay-service" }
talos-inline-compile-service = { path = "../talos-inline-compile-service" }
