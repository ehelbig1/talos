# Prometheus Configuration for Talos WASM Runtime
# Scrapes metrics from Talos worker and exposes them for Grafana

global:
  scrape_interval: 15s      # Scrape targets every 15 seconds
  evaluation_interval: 15s  # Evaluate rules every 15 seconds
  scrape_timeout: 10s       # Timeout after 10 seconds

  # Attach these labels to all time series
  external_labels:
    cluster: 'talos-dev'
    environment: 'development'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load alerting rules
rule_files:
  - 'alerts.yml'

# Scrape configurations
scrape_configs:
  # ========================================================================
  # Prometheus self-monitoring
  # ========================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # ========================================================================
  # Talos Worker Metrics
  # ========================================================================
  - job_name: 'talos-worker'
    scrape_interval: 10s     # Scrape more frequently for worker metrics
    scrape_timeout: 5s
    metrics_path: '/metrics'
    bearer_token: 'dev-metrics-token'

    # Static configuration (for docker-compose and local development)
    static_configs:
      # Production worker (containerized)
      - targets: ['talos-worker:9091']
        labels:
          service: 'talos-worker'
          component: 'wasm-runtime'
          environment: 'production'

      # Local development worker (host machine)
      - targets: ['host.docker.internal:9091']
        labels:
          service: 'talos-worker'
          component: 'wasm-runtime'
          environment: 'development'

    # Alternative: Kubernetes service discovery
    # kubernetes_sd_configs:
    #   - role: pod
    #     namespaces:
    #       names:
    #         - talos
    #
    # relabel_configs:
    #   # Keep only pods with prometheus.io/scrape=true annotation
    #   - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
    #     action: keep
    #     regex: true
    #
    #   # Use prometheus.io/port annotation for port
    #   - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
    #     action: replace
    #     regex: ([^:]+)(?::\d+)?;(\d+)
    #     replacement: $1:$2
    #     target_label: __address__
    #
    #   # Use prometheus.io/path annotation for metrics path
    #   - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
    #     action: replace
    #     target_label: __metrics_path__
    #
    #   # Add pod labels
    #   - source_labels: [__meta_kubernetes_pod_name]
    #     target_label: pod
    #   - source_labels: [__meta_kubernetes_namespace]
    #     target_label: namespace
    #   - source_labels: [__meta_kubernetes_pod_label_app]
    #     target_label: app

  # ========================================================================
  # Grafana self-monitoring (optional)
  # ========================================================================
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service: 'grafana'

  # ========================================================================
  # Jaeger metrics (optional)
  # ========================================================================
  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']
        labels:
          service: 'jaeger'
