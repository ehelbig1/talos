# Grafana Datasource Provisioning
# Automatically configures Prometheus and Jaeger datasources

apiVersion: 1

datasources:
  # ========================================================================
  # Prometheus - Metrics
  # ========================================================================
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: POST
    version: 1

  # ========================================================================
  # Jaeger - Distributed Tracing
  # ========================================================================
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true
    jsonData:
      tracesToLogs:
        # Link traces to logs (if you have Loki)
        datasourceUid: 'loki'
        tags: ['execution_id', 'workflow_id']
    version: 1

  # ========================================================================
  # PostgreSQL - Application Logs
  # ========================================================================
  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: talos
    user: talos
    editable: true
    jsonData:
      sslmode: disable
      postgresVersion: 1500  # PostgreSQL 15
      timescaledb: false
    secureJsonData:
      # SECURITY: Use postgres env var — never hardcode credentials here.
      # Grafana reads this via the GF_SECURITY_DATA_SOURCE_PROXY_WHITELIST mechanism.
      # Set POSTGRES_PASSWORD in your environment before starting the observability stack.
      password: "${POSTGRES_PASSWORD}"
    version: 1
