[package]
name = "talos-hot-update-service"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
anyhow.workspace = true
redis = { version = "0.27", default-features = false, features = ["tokio-comp", "connection-manager", "tls-rustls", "tls-rustls-webpki-roots", "tokio-rustls-comp"] }
regex = "1.12"
serde.workspace = true
serde_json.workspace = true
sha2 = "0.10"
talos-actor-repository = { path = "../talos-actor-repository" }
talos-capability-world = { path = "../talos-capability-world" }
talos-capability-downgrade = { path = "../talos-capability-downgrade" }
talos-compilation = { path = "../talos-compilation" }
talos-module-repository = { path = "../talos-module-repository" }
talos-workflow-creation-helpers = { path = "../talos-workflow-creation-helpers" }
talos-workflow-repository = { path = "../talos-workflow-repository" }
talos-workflow-validation = { path = "../talos-workflow-validation" }
sqlx = { version = "0.8", default-features = false, features = ["postgres", "runtime-tokio-rustls"] }
thiserror.workspace = true
tracing.workspace = true
uuid = { version = "1", features = ["v4", "v5", "serde"] }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }

[lints]
workspace = true
