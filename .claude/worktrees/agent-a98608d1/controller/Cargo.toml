[package]
name = "controller"
version = "0.1.0"
edition = "2021"

[dependencies]
lru = "0.16.3"
# Use Axum 0.8 (required by async-graphql‑axum 7.x)
axum = { version = "0.8", features = ["json", "ws"] }
async-graphql = { version = "7.2", features = ["uuid", "chrono", "dataloader"] }
async-graphql-axum = "7.2"
tokio = { version = "1.49", features = ["full"] }
tokio-stream = { version = "0.1", features = ["sync"] }
async-stream = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.20", features = ["serde", "v4"] }
job-protocol = { path = "../job-protocol" }
sqlx = { version = "0.8", default-features = false, features = ["postgres", "runtime-tokio-rustls", "macros", "uuid", "json", "chrono"] } # Upgrade to fix binary protocol vulnerability (RUSTSEC-2024-0363) and avoid mysql feature conflicts
dotenvy = "0.15"
petgraph = "0.6"
futures = "0.3"
async-trait = "0.1"
worker = { path = "../worker" }
futures-util = "0.3"
rand = { version = "0.8", default-features = true, features = ["std"] }
anyhow = "1.0"
# hyper is needed for the server (hyper 1.x matches axum 0.8)
hyper = { version = "1", default-features = false, features = ["server"] }
# Use tower-http 0.4 for compatibility with axum 0.7
# tower-http removed; custom CORS middleware is used instead.
# Logging dependencies
tracing = "0.1"
tracing-subscriber = "0.3"

# Node creation dependencies
handlebars = "6.4"
sha2 = "0.10"
chrono = { version = "0.4", features = ["serde"] }

# Secrets management and webhook security
aes-gcm = "0.10"
hex = "0.4"
hmac = "0.12"
base64 = "0.13"
constant_time_eq = "0.3"  # Constant-time comparison for cryptographic tokens
subtle = "2.4"  # Constant‑time equality (used for HMAC verification)

# Authentication
bcrypt = "0.18"
jsonwebtoken = { version = "10.3", default-features = false, features = ["rust_crypto"] }
regex = "1.12"

# Cookie handling
tower-cookies = "0.11"

# Rate limiting
governor = "0.6"
tower = { version = "0.5", features = ["util"] }
ipnetwork = "0.21"
dashmap = "5.5"  # Lock-free concurrent HashMap

# External services for WASM capabilities
# Updated to match worker versions for type compatibility
redis = { version = "0.27", default-features = false, features = ["tokio-comp", "connection-manager"] }
async-nats = "0.37"
cap-std = "3.4"  # Capability-based file system for WASM sandboxing

# 2FA/TOTP
totp-rs = "5.7"
qrcode = "0.14"
image = "0.25"

# OAuth/OIDC – implemented with `oauth2` crate only (no `openidconnect`).
oauth2 = { version = "4.4.2", default-features = false, features = ["reqwest"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
url = "2.5"
urlencoding = "2.1"
ring = "0.17" # for constant‑time RSA verification
opentelemetry = "0.27"
opentelemetry_sdk = { version = "0.27", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.27", features = ["grpc-tonic", "reqwest-client", "http-proto"] }
tracing-opentelemetry = "0.28"
tower_governor = "0.8.0"

# S3 client for immutable audit ledger storage (MinIO)
aws-config = "1.5"
aws-sdk-s3 = "1.30"
tonic = "0.12.3"


[features]
default = []
