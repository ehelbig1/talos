[package]
name = "worker"
version = "0.1.0"
edition = "2021"

[dependencies]
# Core async runtime
tokio = { version = "1.41", features = ["full"] }
async-nats = "0.37"

# Upgrade to the latest Wasmtime (44.x) to get async host support and newer component‑model features.
# The 44.x series is not yet published on crates.io, so we pull it directly from the official GitHub source.
# Pinning to the exact tag ensures reproducible builds and fixes the CVE‑2025‑62711 vulnerability.
wasmtime = { version = "41.0.3", features = ["async", "component-model", "parallel-compilation"] }
wasmtime-wasi = "41.0.3"

# Core utilities
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
uuid = { version = "1.11", features = ["serde", "v4"] }
job-protocol = { path = "../job-protocol" }
regex = "1.11"  # For error message sanitization
wasmparser = "0.214"

# Security & sandboxing
cap-std = "3.4"  # Capability-based filesystem security
ring = "0.17"  # Cryptographic operations
tempfile = "3"  # Ephemeral per-execution sandbox directories (auto-shredded on Drop)

# HTTP client
reqwest = { version = "0.12", default-features = false, features = ["json", "gzip", "brotli", "deflate", "stream", "blocking", "rustls-tls"] }
url = "2.5"

# Async utilities
async-trait = "0.1"
futures-util = "0.3"

# Performance & caching
lru = "0.16.3"  # Upgrade to latest safe version (fixes RUSTSEC-2026-0002)
sha2 = "0.10"  # For cache key hashing and crypto interface

# Cryptography (for host functions)
md5 = "0.7"  # MD5 hashing (crypto interface)
hmac = "0.12"  # HMAC operations (crypto interface)
base64 = "0.22"  # Base64 encoding/decoding (crypto interface)
hex = "0.4"  # Hex encoding/decoding (crypto interface)

# Constant-time comparison (used for AOT HMAC verification)
subtle = "2.4"

# Random number generation
rand = { version = "0.8", default-features = true, features = ["std"] }

# Date/time operations
chrono = { version = "0.4", features = ["serde"] }

# Phase 3: Advanced capabilities (v3.0)
minijinja = "2.5"  # Jinja2-compatible template engine
csv = "1.3"  # CSV parsing and generation
quick-xml = { version = "0.37", features = ["serialize"] }  # XML parsing with security
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"] }  # Redis client with connection pooling
graphql_client = { version = "0.16", features = ["reqwest-rustls"] }  # Use Rustls TLS to avoid native-tls

# 🔥 NEW: OpenTelemetry for production observability
opentelemetry = { version = "0.27", features = ["metrics", "trace"] }
opentelemetry_sdk = { version = "0.27", features = ["rt-tokio", "metrics", "trace"] }
opentelemetry-prometheus = "0.27"
opentelemetry-otlp = { version = "0.27", features = ["grpc-tonic", "metrics", "trace"] }
prometheus = "0.13" # Upgrade Prometheus to address protobuf vulnerability (RUSTSEC-2024-0437)
sqlx = { version = "0.8", features = ["postgres", "runtime-tokio", "uuid", "macros"] }
tracing-opentelemetry = "0.28"
wasmtime-wasi-http = "41.0.3"
oci-distribution = "0.11.0"
bytes = "1.11.1"
aho-corasick = "1.1.4"

[dev-dependencies]
wat = "1"  # Convert WAT text to a minimal component for AOT tests

[features]
default = []

