[package]
name = "json-transform"
version = "0.1.0"
edition = "2021"

[dependencies]
wit-bindgen = "0.26.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
talos_sdk_macros = { path = "../../talos_sdk_macros" }

[lib]
crate-type = ["cdylib"]
path = "template.rs"

[package.metadata.component]
package = "talos:json-transform"

[package.metadata.component.target]
path = "../../wit/talos.wit"
world = "minimal-node"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
