[package]
name = "talos-trace"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
opentelemetry = "0.32"
opentelemetry_sdk = { version = "0.32", features = ["rt-tokio"] }
# Only the gRPC/tonic exporter is used. `default-features = false` drops otlp's
# default http-proto + reqwest-blocking-client (opentelemetry-http + reqwest 0.13,
# a duplicate of the workspace's reqwest 0.12) for an HTTP path we never take.
opentelemetry-otlp = { version = "0.32", default-features = false, features = ["grpc-tonic", "trace"] }
tracing.workspace = true
tracing-opentelemetry = "0.33"
tracing-subscriber = "0.3"

[lints]
workspace = true
