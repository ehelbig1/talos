[package]
name = "talos-search-service"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
anyhow.workspace = true
arc-swap = "1.7"
governor = "0.6"
regex = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde.workspace = true
serde_json.workspace = true
sqlx = { version = "0.8", default-features = false, features = ["postgres", "runtime-tokio-rustls", "uuid"] }
thiserror.workspace = true
tracing.workspace = true
uuid = { version = "1", features = ["v4", "serde"] }

# Talos crates
talos-dlp-provider = { path = "../talos-dlp-provider" }
talos-text-util = { path = "../talos-text-util" }
talos-workflow-repository = { path = "../talos-workflow-repository" }

[lints]
workspace = true
