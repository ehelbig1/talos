name: Quality (heavy gates)

# The correctness gates that are too slow or too network-dependent for the
# local pre-push hook (`make lint` + `make lint-frontend`), so they need a CI
# home or they silently rot — exactly how the RLS isolation suite sat red on
# main for days (PR #181/#182). Lean by design: it runs ONLY the correctness
# gates. The expensive image builds (docker / sandbox-image) stay in ci.yml,
# which remains workflow_dispatch-only.
#
# Unique value over the pre-push hook:
#   * full Rust workspace test suite (unit) — too slow for pre-push
#   * env-gated INTEGRATION tests (RLS isolation, crash-recovery, …) — the
#     pre-push hook can't spin up Postgres/Redis; `cargo nextest` alone SKIPS
#     them (they no-op unless TALOS_TEST_*_URL is set)
#   * networked RUSTSEC advisory scan — pre-push runs only the OFFLINE
#     cargo-deny checks (bans/licenses/sources)
#   * frontend lint + test as an unbypassable backstop for contributors who
#     skip `make hooks`
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * *" # nightly 07:00 UTC — catches new RUSTSEC advisories within 24h
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Single source of truth for the toolchain — keep in lockstep with ci.yml
  # and rust-toolchain.toml.
  RUST_TOOLCHAIN: "1.95"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Supply-chain: networked RUSTSEC advisories + bans/licenses/sources ─────
  # `make audit` = cargo-deny (advisories + bans + licenses + sources) + the
  # secret-pattern scan + migration-idempotency checks. The advisory DB fetch
  # needs network, which is why this can't live in the offline pre-push hook.
  audit:
    name: Supply-chain (cargo-deny advisories)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install cargo-deny
        uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
        with:
          tool: cargo-deny

      - name: make audit
        # Full supply-chain gate: cargo-deny (networked advisories + bans +
        # licenses + sources) + the secret-pattern scan + migration-idempotency
        # check. Single source of truth with the local `make audit`. The scan's
        # earlier false-positive on DLP test fixtures (sk-AAAA…) is fixed via the
        # `// secret-scan-allow:` opt-out marker, so the full gate now runs here.
        run: make audit

  # ── Rust unit tests: library unit tests + the DB-free integration binaries ──
  # The bulk is `--lib` (~1.3k DB-free unit tests). On top of that we explicitly
  # run the two `tests/`-dir integration binaries that are DB-free once their
  # never-in-CI bugs were fixed: `module_template_tests` (disk template
  # discovery) and `sandbox_security_tests` (WASM sandbox boundaries). The
  # remaining `tests/`-dir binaries need a full-app DB harness and run in the
  # `integration` job below (`make test-integration`) — bringing those in is
  # tracked in docs/backlog.md. `--lib` keeps the default run from re-executing
  # (and failing on) the DB-requiring binaries.
  test:
    name: Rust tests (unit / lib)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # `--lib` tests are DB-free (no Postgres service needed). Keep a non-zero
      # master key + JWT secret as defensive env in case a lib test constructs
      # SecretsManager/AuthService (all-zero is rejected). 64 hex = 32 bytes.
      TALOS_MASTER_KEY: "00000000000000000000000000000000000000000000000000000000deadbeef"
      JWT_SECRET: "ci-jwt-secret-32-bytes-of-padding-zzzzz"
      # Trim debuginfo so the workspace debug build doesn't exhaust runner disk.
      CARGO_PROFILE_DEV_DEBUG: line-tables-only
      CARGO_PROFILE_TEST_DEBUG: line-tables-only
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Install mold linker
        # .cargo/config.toml pins `-fuse-ld=mold` for x86_64-unknown-linux-gnu,
        # so a Linux host can't link the workspace without mold installed.
        run: sudo apt-get update -qq && sudo apt-get install -y -qq mold

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: quality-test

      - name: Install cargo-nextest
        uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
        with:
          tool: cargo-nextest

      - name: Run library unit tests
        run: cargo nextest run --workspace --lib --no-fail-fast

      - name: Run module-template catalog tests
        # An integration binary (so NOT covered by --lib above), but DB-free: it
        # exercises talos_module_templates::all_templates disk discovery, reading
        # `module-templates/` straight from the checkout. Brought into CI once the
        # CARGO_MANIFEST_DIR path-resolution bug was fixed (the discovery fallback
        # had silently resolved to a non-existent dir since the May-2026 crate move,
        # so every get_template() returned None). The OTHER tests/-dir binaries are
        # still excluded here — they need a built WASM sandbox / full-app DB
        # harness (tracked in docs/backlog.md).
        run: cargo nextest run -p controller --test module_template_tests

      - name: Run worker sandbox security tests
        # Integration binary, DB-free: exercises the WASM sandbox security
        # boundaries (path-traversal rejection, capability gates, SSRF host
        # allow/deny, resource caps) via an in-process TalosContext — no network
        # or DB required. Brought into CI after the stale path-traversal tests
        # were corrected to the post-MCP-586 capability contract (PR #192). These
        # are tenant-isolation/sandbox-escape guards — exactly the class that
        # must not silently rot, which it did while never-in-CI.
        run: cargo nextest run -p worker --test sandbox_security_tests

      - name: Run DB-free security integration binaries
        # More tests/-dir binaries that need NO database or container — pure
        # logic / in-process harnesses, like the two steps above. They never ran
        # in CI (only --lib + the two explicit binaries did), so they were free
        # to rot. All verified green. Run via nextest specifically because
        # `csrf_integration_tests` mutates process-global env (RUST_ENV,
        # ALLOW_DEV_UNSAFE_CSRF_BYPASS) — under `cargo test`'s thread parallelism
        # a sibling test's env write races and falsely "bypasses" CSRF; nextest's
        # process-per-test isolation makes each test's env private, so the gate is
        # stable. Covers: JWT security, CSRF protection, input validation,
        # MCP-safety, webhook security (controller); tier-1 LLM egress + agentic
        # safety (worker); signed job-protocol security (HMAC/replay/wire-format).
        run: |
          cargo nextest run -p controller \
            --test jwt_security_tests \
            --test webhook_security_tests \
            --test csrf_integration_tests \
            --test input_validation_tests \
            --test mcp_safety_tests
          cargo nextest run -p worker \
            --test tier1_llm_enforcement_tests \
            --test agentic_safety_tests
          cargo nextest run -p talos-workflow-job-protocol --test security_tests

      - name: Run DB-free engine + protocol + remaining integration binaries
        # The rest of the workspace's DB-free tests/-dir binaries — engine
        # behaviour (cancellation, checkpointing, fan-in, subflow recursion,
        # wait/pause/resume, timeouts, rate-limit, precheck, trigger input),
        # signed job-protocol serialization + wire-format snapshots, worker
        # runtime/trap, and controller circuit-breaker / execution-event /
        # JS-compilation / NATS-topic / rhai / worker-manager. All verified
        # green and need no DB or container. Completes the DB-free never-in-CI
        # gate; the only remaining ungated binaries need a real DB
        # (env_vars / scheduler_tests / workflow_version_tests — tracked) or NATS
        # (webhooks_hmac_test, already #[ignore]'d).
        run: |
          cargo nextest run -p talos-workflow-engine \
            --test cancellation \
            --test checkpointing \
            --test fan_in_join \
            --test precheck_errors \
            --test rate_limit_store \
            --test subflow_recursion \
            --test trigger_input \
            --test wait_pause_resume \
            --test workflow_timeout
          cargo nextest run -p talos-workflow-job-protocol \
            --test serialization \
            --test wire_format_snapshots
          cargo nextest run -p worker \
            --test runtime_test \
            --test runtime_integration_test \
            --test trap_test
          cargo nextest run -p controller \
            --test circuit_breaker_integration \
            --test execution_event_tests \
            --test js_compilation_tests \
            --test nats_topic_tests \
            --test rhai_check \
            --test worker_manager_tests

      - name: Run doctests
        # nextest does NOT run doctests (a documented limitation), so the steps
        # above skip them entirely — they were dropped from CI and went unrun.
        # `cargo test --doc` is the only runner for them. ~218 doctests across
        # the workspace, all DB-free. Confirmed green before re-adding (the last
        # item from the never-in-CI sweep's docs/backlog.md note).
        run: cargo test --workspace --doc

  # ── Integration tests: the env-gated DB suite (RLS isolation, crash ────────
  # recovery, memory, …). `make test-integration` provisions its own disposable
  # pgvector + Redis via Docker (available on ubuntu-latest), applies the full
  # migration set, sets TALOS_TEST_*_URL, runs the gated tests, and tears down.
  # This is the gate that catches what `cargo nextest` SKIPS — e.g. the RLS
  # write-isolation regression in PR #181/#182.
  integration:
    name: Rust tests (integration / DB)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Install mold linker
        # .cargo/config.toml pins `-fuse-ld=mold` for x86_64-unknown-linux-gnu,
        # so a Linux host can't link the workspace without mold installed.
        run: sudo apt-get update -qq && sudo apt-get install -y -qq mold

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: quality-integration

      - name: Install sqlx-cli
        # `make test-integration` runs `sqlx migrate run` against the disposable
        # Postgres it provisions.
        uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
        with:
          tool: sqlx-cli

      - name: make test-integration
        # Self-contained: provisions disposable Docker pgvector + Redis, migrates,
        # runs the TALOS_TEST_*_URL-gated tests, tears down. Single source of
        # truth with the local target.
        run: make test-integration

  # ── Frontend: lint + typecheck + tests (backstop for non-`make hooks` devs) ─
  frontend:
    name: Frontend (lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint (eslint + prettier)
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run
