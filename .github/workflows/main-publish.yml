name: Main Publish

# CANONICAL publish path (2026-07-24): workflow_dispatch-triggered CI
# build that pushes signed `:main-<sha>` and `:main-latest` images to
# GHCR and signs them with THIS WORKFLOW's OIDC identity (Fulcio
# keyless). The signature binds to the workflow URI — NOT to any human's
# GitHub OAuth identity — so clusters enforcing Sigstore admission pin
# ONE stable identity regardless of which operator clicks "Run
# workflow". This removes the per-operator identity-widening problem
# that made the local publish path a bus-factor risk (any collaborator
# with `gh workflow run` access can now cut a production image; see
# docs/second-operator-publish-runbook.md).
#
# Fallback: scripts/publish-images.sh — local build + push + cosign
# signed with the operator's PERSONAL GitHub OAuth identity. Same output
# contract (tags, digests, TALOS_*_DIGEST block), but requires the
# cluster's identity regexp to be widened per human operator. Use it
# only when GHA is unavailable.
#
# Relationship to release.yml:
#   - release.yml fires on `v*` tags, emits SLSA-L2 attestations,
#     publishes a GitHub Release, signs by digest. THE tagged-release path.
#   - main-publish.yml (this file) is dispatch-only, signs by digest,
#     emits digests in the job summary. Lighter — no GitHub Release, no
#     SLSA provenance attestation. Tagged-release verification contract
#     is unaffected.
#
# Publish-gate parity with the local script: the `ci-gate` job requires
# a green quality.yml run for the EXACT SHA being built (the CI analogue
# of publish-images.sh's gh-run-list gate; the script's clean-tree check
# is inherent here — a dispatch can only build a committed, pushed SHA).
# Bypass mirrors the script's --skip-ci-check: the `skip_ci_check`
# input — explicit and recorded in the run log, by design.
#
# Verification (example — the identity is the WORKFLOW URI):
#   cosign verify \
#     --certificate-identity-regexp "^https://github\\.com/OWNER/talos/\\.github/workflows/main-publish\\.yml@" \
#     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
#     ghcr.io/OWNER/talos-controller@sha256:<digest>
#
# The trailing `@` in the identity regexp is load-bearing: without it, a
# fork workflow named `main-publish.yml-evil.yml` would also match (same
# class as the template-publish.yml pin documented in CLAUDE.md). Append
# `refs/heads/main$` after the `@` to additionally pin the ref.

# Auto-trigger on push to main stays DISABLED (deliberate May-2026
# decision) — every publish is an explicit workflow_dispatch run. To
# restore the push trigger, uncomment the block below.
on:
  workflow_dispatch:
    inputs:
      skip_ci_check:
        description: >-
          Skip the green-quality.yml gate for this SHA (mirrors
          publish-images.sh --skip-ci-check). Deliberate bypass only —
          do not use for production publishes.
        type: boolean
        required: false
        default: false
  # push:
  #   branches: [main]
  #   paths-ignore:
  #     - "**.md"
  #     - "docs/**"
  #     - "memory/**"
  #     - ".gitignore"
  #     - "LICENSE*"

permissions:
  contents: read
  packages: write   # ghcr.io push
  id-token: write   # OIDC token for Sigstore keyless signing

# Cancel in-flight runs of the same workflow + ref. Back-to-back commits
# on main skip the older build instead of queueing.
concurrency:
  group: main-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/talos
  # Short SHA used in `:main-<sha>` tag. Operators reference this tag
  # when they want an immutable pin to a specific main commit.
  SHORT_SHA: ${{ github.sha }}

jobs:
  # ── Publish gate: require a green quality.yml run for this SHA ─────────
  # CI analogue of publish-images.sh's gate: nothing else stands between
  # this workflow and a production image, so refuse to build unless the
  # heavy correctness gates (full test suite, integration tests, RUSTSEC
  # scan) passed for the EXACT commit being published. quality.yml runs on
  # push:main, so every squash-merged commit has a run bound to its own
  # SHA. Bypass: the `skip_ci_check` dispatch input — explicit, visible in
  # the run log.
  ci-gate:
    name: Publish gate (quality.yml green)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read # gh run list over this repo's workflow runs
    steps:
      - name: Require green quality.yml for ${{ github.sha }}
        if: ${{ !inputs.skip_ci_check }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          GREEN_RUNS="$(gh run list --repo "${{ github.repository }}" \
                          --workflow quality.yml --commit "${{ github.sha }}" \
                          --json conclusion \
                          --jq '[.[] | select(.conclusion == "success")] | length')"
          if [[ "${GREEN_RUNS:-0}" -lt 1 ]]; then
            echo "::error::no successful quality.yml run found for ${{ github.sha }}."
            echo "Trigger one:  gh workflow run quality.yml --ref <this ref>"
            echo "Then re-dispatch this workflow once it's green (gh run watch)."
            echo "Deliberate bypass: re-run with the skip_ci_check input set."
            exit 1
          fi
          echo "quality.yml green for ${{ github.sha }} (${GREEN_RUNS} successful run(s))"

      - name: CI gate bypassed
        if: ${{ inputs.skip_ci_check }}
        run: |
          echo "::warning::skip_ci_check=true — publishing WITHOUT a verified green quality.yml run for ${{ github.sha }}"

  # ── Build + push three service images in parallel ─────────────────────
  build:
    name: Build & Push (${{ matrix.service }})
    needs: [ci-gate]
    runs-on: ubuntu-latest
    # 60 minutes — the cold cargo workspace build takes ~45 min on a
    # 16-CPU runner; warm builds with BuildKit cache hit ~15 min.
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        service: [controller, worker, frontend]
        # Per-service build context. controller/worker Dockerfiles expect
        # the REPO ROOT as context (they COPY the whole cargo workspace);
        # frontend/Dockerfile expects frontend/ as context (`COPY
        # package.json`, `COPY nginx.conf` are frontend-relative — same
        # shape as docker-compose.yml and publish-images.sh). The previous
        # single `context: .` broke the frontend leg.
        include:
          - service: controller
            context: .
            dockerfile: controller/Dockerfile
          - service: worker
            context: .
            dockerfile: worker/Dockerfile
          - service: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
    # NOTE: this matrix uses artifact upload (not `outputs:`) to hand off
    # digests to the downstream sign + summarise jobs. matrix-level
    # `outputs:` is a foot-gun — each matrix entry overwrites the job's
    # outputs block as a whole, so only the LAST entry's values survive
    # for downstream `needs.build.outputs.X`. Artifact upload is the
    # canonical pattern for fanning service-keyed values out of a matrix.
    steps:
      # All third-party actions pinned by full commit SHA. A moving tag
      # (`@v3`) could be redirected by a compromised upstream and inject
      # arbitrary steps under our OIDC token (which signs in our name).
      # Pinned-by-SHA gives us an offline-verifiable commitment to the
      # exact action source. Bump in lockstep with release.yml.
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      # BuildKit gives us per-layer parallelism + GHA cache backend
      # (`type=gha,mode=max`), which dramatically reduces cold-build time
      # for the Rust workspaces (controller + worker share most deps).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute image tags. The mutable `:main-latest` floats; the
      # `:main-<sha>` is immutable and what operators should pin to in
      # install.env for deterministic deploys. Both tags resolve to the
      # SAME digest, so cosign signatures cover both.
      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          IMAGE="${REGISTRY}/${IMAGE_PREFIX}-${{ matrix.service }}"
          SHORT="${SHORT_SHA:0:12}"
          # Order matters for `tags:` input below — Docker pushes them in
          # listed order. Mutable tag last so a partial-push leaves the
          # immutable tag as the canonical pointer.
          echo "tags=${IMAGE}:main-${SHORT},${IMAGE}:main-latest" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "short=${SHORT}" >> "$GITHUB_OUTPUT"

      # OCI labels for traceability — pulled from the image manifest by
      # `docker inspect`, `cosign verify --output-file`, etc.
      - name: Compute labels
        id: labels
        run: |
          cat <<EOF >> "$GITHUB_OUTPUT"
          labels<<LABELS_EOF
          org.opencontainers.image.source=https://github.com/${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          org.opencontainers.image.title=talos-${{ matrix.service }}
          org.opencontainers.image.description=Talos ${{ matrix.service }} — main-branch build
          org.opencontainers.image.licenses=MIT OR Apache-2.0
          LABELS_EOF
          EOF

      # Build + push in one step. `provenance: true` attaches a SLSA
      # provenance attestation to the image (lighter than the L2
      # attestation release.yml emits via slsa-github-generator, but
      # enough for SBOM + identity verification on main builds).
      - name: Build & push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          # Explicit target platform — matches publish-images.sh's default
          # and the production x86_64 k3s VM. (ubuntu-latest is amd64
          # anyway; the pin makes the contract survive runner changes.)
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.labels.outputs.labels }}
          # GHA cache backend — survives across runs on the same branch,
          # keyed by Dockerfile path. `mode=max` caches every layer
          # (default is min = only final layer). For Rust workspaces the
          # cargo deps layer is by far the biggest; max is worth it.
          cache-from: type=gha,scope=main-${{ matrix.service }}
          cache-to: type=gha,scope=main-${{ matrix.service }},mode=max
          push: true
          provenance: true
          # Build args expose the git SHA to the controller binary's
          # build.rs so session_start.server_version reflects this commit.
          # Mirrors release.yml's GIT_SHA_OVERRIDE pattern.
          build-args: |
            GIT_SHA_OVERRIDE=${{ github.sha }}
            GIT_DIRTY_OVERRIDE=false

      # Persist the digest as a tiny artifact so the sign + summarise
      # jobs can read it back. One artifact per service; downstream jobs
      # download all three with a single `pattern: digest-*` call.
      - name: Write digest to file
        id: collect-digest
        run: |
          set -euo pipefail
          DIGEST="${{ steps.build.outputs.digest }}"
          if [[ -z "$DIGEST" ]]; then
            echo "::error::digest empty — docker/build-push-action did not return one"
            exit 1
          fi
          mkdir -p /tmp/digests
          printf '%s' "$DIGEST" > "/tmp/digests/${{ matrix.service }}.txt"
          echo "✓ ${{ matrix.service }} pushed: ${DIGEST}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: digest-${{ matrix.service }}
          path: /tmp/digests/${{ matrix.service }}.txt
          # Tiny payload (one sha256 line). 1-day retention is plenty —
          # downstream jobs run within seconds and we don't keep these
          # past the workflow run.
          retention-days: 1
          if-no-files-found: error

      # Job-summary entry per service — visible in the workflow run UI,
      # operators paste these directly into install.env. The full summary
      # (all three services side-by-side) is assembled in the `summarise`
      # job below.
      - name: Append to job summary
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## ${{ matrix.service }}
          \`\`\`
          TALOS_$(echo "${{ matrix.service }}" | tr '[:lower:]' '[:upper:]')_DIGEST=${{ steps.build.outputs.digest }}
          \`\`\`
          Image: \`${{ steps.tags.outputs.image }}:main-${{ steps.tags.outputs.short }}\`
          EOF

  # ── Sign each image (keyless, Sigstore + Rekor) ─────────────────────────
  # Separate job so its OIDC token scope is narrowly "signing", not
  # "build+push+sign". Limits blast radius if signing is ever compromised.
  # Mirrors the structure in release.yml.
  sign:
    name: Sign (${{ matrix.service }})
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service: [controller, worker, frontend]
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a  # v3.8.1

      - name: Download digest artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: digest-${{ matrix.service }}
          path: /tmp/digests/

      - name: Resolve digest
        id: digest
        run: |
          set -euo pipefail
          D="$(cat /tmp/digests/${{ matrix.service }}.txt)"
          if [[ -z "$D" ]]; then
            echo "::error::digest artifact empty for ${{ matrix.service }}"
            exit 1
          fi
          echo "digest=$D" >> "$GITHUB_OUTPUT"

      - name: Sign image (keyless, Sigstore + Rekor)
        env:
          # Opt into keyless — identity from the workflow's OIDC token.
          # Fulcio issues a short-lived cert (~10 min) bound to this
          # workflow URI + ref; Rekor records the signature publicly so a
          # later cert revocation is detectable via transparency-log
          # queries.
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          IMAGE="${REGISTRY}/${IMAGE_PREFIX}-${{ matrix.service }}@${{ steps.digest.outputs.digest }}"
          echo "Signing: $IMAGE"
          cosign sign --yes "$IMAGE"

  # ── Final job summary table ───────────────────────────────────────────
  # Single source of truth for "what just got pushed" — operators land
  # here from the run URL, copy the three TALOS_*_DIGEST lines into their
  # install.env, run install.sh.
  summarise:
    name: Publish summary
    needs: [build, sign]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download digest artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: digest-*
          path: /tmp/digests/
          merge-multiple: true

      - name: Emit final summary
        run: |
          set -euo pipefail
          SHORT="${SHORT_SHA:0:12}"
          # Each digest artifact was uploaded by the build matrix job as
          # `digest-<service>` containing `<service>.txt` with the
          # sha256:... line. `merge-multiple: true` flattens them into
          # /tmp/digests/{controller,worker,frontend}.txt.
          CONTROLLER_DIGEST="$(cat /tmp/digests/controller.txt)"
          WORKER_DIGEST="$(cat /tmp/digests/worker.txt)"
          FRONTEND_DIGEST="$(cat /tmp/digests/frontend.txt)"

          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          # 🚀 Main publish complete — ${SHORT}

          Copy into \`/etc/talos/install.env\` on your cluster host, then
          re-run \`sudo /opt/talos/deploy/k3s/install.sh\`:

          \`\`\`
          TALOS_CONTROLLER_DIGEST=${CONTROLLER_DIGEST}
          TALOS_WORKER_DIGEST=${WORKER_DIGEST}
          TALOS_FRONTEND_DIGEST=${FRONTEND_DIGEST}
          \`\`\`

          Or pin to the mutable \`:main-latest\` tag (auto-tracks future
          pushes — only use this on dev clusters; production should pin
          to digests for reproducible deploys).

          ## Verification
          \`\`\`
          cosign verify \\\\
            --certificate-identity-regexp "^https://github\\\\.com/${{ github.repository }}/\\\\.github/workflows/main-publish\\\\.yml@refs/heads/main\$" \\\\
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \\\\
            ${REGISTRY}/${IMAGE_PREFIX}-controller@\${CONTROLLER_DIGEST}
          \`\`\`
          EOF
