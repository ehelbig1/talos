[package]
name = "talos-integration-helpers"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
anyhow.workspace = true
async-trait = "0.1"
axum = { version = "0.8", features = ["json"] }
chrono.workspace = true
dashmap = "6.1"
serde.workspace = true
serde_json.workspace = true
sqlx = { version = "0.8", default-features = false, features = ["postgres", "runtime-tokio-rustls", "macros", "uuid", "json", "chrono"] }
subtle = "2.4"
talos-config = { path = "../talos-config" }
talos-dlp-provider = { path = "../talos-dlp-provider" }
talos-integration-state = { path = "../talos-integration-state" }
talos-memory = { path = "../talos-memory" }
talos-secrets-manager = { path = "../talos-secrets-manager" }
talos-text-util = { path = "../talos-text-util" }
talos-workflow-job-protocol = { path = "../talos-workflow-job-protocol" }
tokio = { version = "1", features = ["sync", "rt", "macros", "time"] }
tracing.workspace = true
uuid.workspace = true

[dev-dependencies]
# `start_paused = true` in the renewal-scheduler test needs tokio's
# test-util clock control.
tokio = { version = "1", features = ["sync", "rt", "macros", "time", "test-util"] }

[lints]
workspace = true
