[package]
name = "talos-evaluation"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
anyhow.workspace = true
chrono.workspace = true
serde.workspace = true
serde_json.workspace = true
sqlx = { version = "0.8", default-features = false, features = ["postgres", "runtime-tokio-rustls", "macros", "uuid", "json", "chrono"] }
thiserror = "1"
talos-execution-orchestration = { path = "../talos-execution-orchestration" }
talos-execution-repository = { path = "../talos-execution-repository" }
talos-actor-repository = { path = "../talos-actor-repository" }
talos-llm = { path = "../talos-llm" }
talos-memory = { path = "../talos-memory" }
talos-secrets-manager = { path = "../talos-secrets-manager" }
tokio = { version = "1", features = ["rt", "sync", "time"] }
tracing.workspace = true
uuid.workspace = true

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
