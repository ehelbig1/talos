[package]
name = "talos-github"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
# RS256 signing for GitHub App JWTs is done with `ring` (constant-time RSA,
# NOT affected by RUSTSEC-2023-0071 / the Marvin timing sidechannel). The
# `rsa` crate is used ONLY to parse/normalize the App private key PEM
# (PKCS#1 → PKCS#8) — never for the private-key signing/decryption operation
# the advisory covers. See docs/rfcs/0008-github-app-authentication.md (D3) and
# the RUSTSEC-2023-0071 note in deny.toml.
base64 = "0.22"
chrono = { workspace = true }
# Webhook signature verification (B5) — same primitives as talos-webhooks.
hex = "0.4"
hmac = "0.12"
ring = "0.17"
sha2 = "0.10"
subtle = "2.4"
rsa = { version = "0.9", features = ["std", "pem"] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
zeroize = { version = "1.8", features = ["derive"] }

# Optional — only the async `client` feature (controller-side HTTP). The
# crypto/parse core builds without these.
anyhow = { workspace = true, optional = true }
dashmap = { version = "6", optional = true }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"], optional = true }
talos-http-body = { path = "../talos-http-body", optional = true }
tokio = { version = "1", default-features = false, features = ["sync"], optional = true }
tracing = { workspace = true, optional = true }

[features]
# Async GitHub App API client (mint installation token, get installation) +
# the in-memory installation-token cache. Off by default so the crypto/parse
# core stays reqwest-free.
client = ["dep:anyhow", "dep:dashmap", "dep:reqwest", "dep:talos-http-body", "dep:tokio", "dep:tracing"]

[dev-dependencies]
# Cross-check: sign with ring, VERIFY with jsonwebtoken (independent impl).
jsonwebtoken = { version = "10.3", default-features = false, features = ["rust_crypto", "use_pem"] }
rand = "0.8"

[lints]
workspace = true
