[package]
name = "worker"
version = "0.1.0"
edition = "2021"
# Internal workspace crate — not published to crates.io. Set `publish = false`
# + a license string so cargo-deny's unlicensed-crate check passes without
# requiring legal review for code that never leaves this repo.
publish = false
license = "MIT OR Apache-2.0"

# The deployable worker BINARY. The library half (wasmtime WASM host:
# TalosRuntime, TalosContext, host/ modules, module_fetcher, sql_validator,
# wit_inspector, …) lives in `talos-worker-runtime`; `src/lib.rs` here is a
# thin re-export shim so `worker::…` paths keep resolving. Only bin-side
# modules remain: main.rs, metrics_server, secret_claim, self_register.

[dependencies]
# The extracted WASM host runtime — everything the bin executes jobs with.
talos-worker-runtime = { path = "../talos-worker-runtime" }

# Core async runtime
tokio = { version = "1.41", features = ["full"] }
async-nats = "0.47"
talos-nats-tls = { path = "../talos-nats-tls" }

# Core utilities
anyhow = "1.0"
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
uuid = { version = "1.11", features = ["serde", "v4"] }
talos-workflow-job-protocol = { path = "../talos-workflow-job-protocol" }
talos-workflow-engine-core = { path = "../talos-workflow-engine-core" }
talos-memory = { path = "../talos-memory" }
talos-shutdown = { path = "../talos-shutdown" }
talos-config = { path = "../talos-config" }

# HTTP client (self_register boot-time identity registration)
reqwest = { version = "0.12", default-features = false, features = ["json", "gzip", "brotli", "deflate", "stream", "rustls-tls"] }

# Async utilities
futures-util = "0.3"

# Hashing / encoding (job-result signing + cache keys)
sha2 = "0.10"
hex = "0.4"

# Constant-time comparison (metrics-server auth token, result verification)
subtle = "2.4"

# Random number generation (secret-claim nonces, self-register jitter)
rand = { version = "0.8", default-features = true, features = ["std"] }

# Redis (OCI module cache wiring in main.rs)
redis = { version = "0.27", features = ["tokio-comp", "connection-manager", "tls-rustls", "tls-rustls-webpki-roots", "tokio-rustls-comp"] }  # rustls for rediss:// (Upstash, ElastiCache TLS)
# rustls direct dep so worker/main.rs can install the ring CryptoProvider
# at startup — required since rustls 0.23 stopped auto-selecting one when
# multiple crates pull rustls in (redis + reqwest in our case).
rustls = { version = "0.23", default-features = false, features = ["ring"] }

# Observability (OTLP trace-context propagation + Prometheus metrics endpoint)
opentelemetry = { version = "0.32", features = ["metrics", "trace"] }
prometheus = "0.14"
tracing-opentelemetry = "0.33"

bytes = "1.11.1"

[dev-dependencies]
# Integration tests (tests/) compile guest fixtures and poke the runtime
# directly; the runtime itself comes through talos-worker-runtime.
wasmtime = { version = "45.0.3", features = ["async", "component-model", "parallel-compilation", "memory-protection-keys"] }
wat = "1"  # Convert WAT text to a minimal component for AOT tests
wit-component = "0.224"
wit-parser = "0.224"  # Resolve the minimal-node world for kill-switch integration fixtures

[features]
default = []


[lints]
workspace = true
