[package]
name = "talos-memory"
version = "0.1.0"
edition = "2021"
publish = false
license = "MIT OR Apache-2.0"

[dependencies]
anyhow = "1"
arc-swap = "1.7"
dashmap = "6.1"
chrono = { version = "0.4", features = ["serde"] }
hmac = "0.12"
pgvector = { version = "0.4", features = ["sqlx"] }
rand = { version = "0.8", default-features = true, features = ["std"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
sqlx = { version = "0.8", default-features = false, features = ["postgres", "runtime-tokio-rustls", "macros", "uuid", "json", "chrono"] }
subtle = "2"
talos-http-body = { path = "../talos-http-body" }
# MCP-1050: canonical truncate_at_char_boundary for embedding input.
talos-text-util = { path = "../talos-text-util" }
tokio = { version = "1", features = ["sync", "rt", "macros", "rt-multi-thread"] }
tracing = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }
zeroize = "1.8"

[lints]
workspace = true
