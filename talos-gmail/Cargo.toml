[package]
name = "talos-gmail"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
talos-http-utils = { path = "../talos-http-utils" }
anyhow.workspace = true
# arc-swap / jsonwebtoken / thiserror moved out 2026-07: the JWK cache +
# RS256 verifier they backed were lifted into
# talos-integration-helpers::google_jwt. jsonwebtoken is now test-only
# (see [dev-dependencies]).
async-nats = "0.47"
async-trait = "0.1"
axum = { version = "0.8", features = ["json"] }
base64 = "0.22"
chrono.workspace = true
dashmap = "6.1"
redis = { version = "0.27", default-features = false, features = ["tokio-comp", "connection-manager", "tls-rustls", "tls-rustls-webpki-roots", "tokio-rustls-comp"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde.workspace = true
serde_json.workspace = true
sqlx = { version = "0.8", default-features = false, features = ["postgres", "runtime-tokio-rustls", "macros", "uuid", "json", "chrono"] }
# `subtle` removed 2026-07: the admin ct_eq gate (MCP-983) moved to
# talos-integration-helpers::admin.
# MCP-1021: canonical FRONTEND_URL validation (rejects ? and # in addition
# to /; the inline validator we removed only checked /).
talos-config = { path = "../talos-config" }
# Push → workflow trigger. talos-continuation-trigger is a leaf of the
# execution-engine stack (engine / repos / authorization); nothing in its
# dep tree references talos-gmail, so this edge introduces no cycle. It
# runs the workflow-authorization gate + effective-actor resolution before
# building the engine (CLAUDE.md lint checks 42/56).
talos-continuation-trigger = { path = "../talos-continuation-trigger" }
talos-dlp-provider = { path = "../talos-dlp-provider" }
talos-http-body = { path = "../talos-http-body" }
talos-integration-helpers = { path = "../talos-integration-helpers" }
talos-integration-state = { path = "../talos-integration-state" }
talos-memory = { path = "../talos-memory" }
talos-module-executions = { path = "../talos-module-executions" }
talos-actor-repository = { path = "../talos-actor-repository" }
talos-oauth = { path = "../talos-oauth" }
talos-registry = { path = "../talos-registry" }
talos-secrets-manager = { path = "../talos-secrets-manager" }
talos-text-util = { path = "../talos-text-util" }
talos-trace-nats = { path = "../talos-trace-nats" }
talos-workflow-engine-core = { path = "../talos-workflow-engine-core" }
talos-workflow-job-protocol = { path = "../talos-workflow-job-protocol" }
tokio = { version = "1", features = ["sync", "rt", "macros", "time"] }
tracing.workspace = true
urlencoding = "2.1"
uuid.workspace = true

[dev-dependencies]
# Used by pubsub_jwt::tests to mint RSA keypairs that back locally-signed
# test JWTs. Production verifier fetches JWKs from Google and never calls
# rsa::* directly. jsonwebtoken is test-only now that the verifier kernel
# lives in talos-integration-helpers.
jsonwebtoken = { version = "10.3", default-features = false, features = ["rust_crypto", "use_pem"] }
rand = "0.8"
rsa = { version = "0.9", features = ["pem"] }
# Enable the helpers `test-util` feature so pubsub_jwt's wrapper tests can
# call GoogleOidcVerifier::with_keys_for_test (gated cross-crate behind
# that feature).
talos-integration-helpers = { path = "../talos-integration-helpers", features = ["test-util"] }

[lints]
workspace = true
