# RFC 0011 ML lifecycle operations — the model-review UI (human-in-the-loop
# disagreement resolution). Source documents for graphql-codegen —
# `npm run codegen` regenerates the typed react-query hooks + Document
# constants from these.

query MlModels {
  mlModels {
    id
    name
    taskType
    lifecycleState
    promotedVersion
    promotedAccuracy
    pendingDisagreements
  }
}

query MlModelDisagreements($modelName: String!, $limit: Int) {
  mlModelDisagreements(modelName: $modelName, limit: $limit) {
    modelId
    lifecycleState
    shadowAgreement
    shadowObservations
    shadowEpoch
    pending {
      id
      exampleKey
      featuresText
      kind
      fastLabel
      fastConfidence
      llmLabel
      createdAt
    }
  }
}

mutation ResolveMlDisagreement($disagreementId: UUID!, $correctLabel: String) {
  resolveMlDisagreement(
    disagreementId: $disagreementId
    correctLabel: $correctLabel
  ) {
    disagreementId
    status
    correctionAppended
  }
}

# Smart Classifier — one-call provisioning of the model/dataset/policy behind
# a classifier node, and binding the workflow to the owning actor.
mutation ProvisionMlClassifier(
  $name: String!
  $labels: [String!]!
  $actorId: UUID!
  $fallbackProvider: String
  $fallbackModel: String
  $allowExternalLlm: Boolean
  $k: Int
  $confidenceThreshold: Float
  $maxExamples: Int
) {
  provisionMlClassifier(
    name: $name
    labels: $labels
    actorId: $actorId
    fallbackProvider: $fallbackProvider
    fallbackModel: $fallbackModel
    allowExternalLlm: $allowExternalLlm
    k: $k
    confidenceThreshold: $confidenceThreshold
    maxExamples: $maxExamples
  ) {
    modelName
    modelId
    datasetId
    lifecycleState
    alreadyExisted
    localityWarning
  }
}

mutation SetWorkflowActorId($workflowId: UUID!, $actorId: UUID) {
  setWorkflowActorId(workflowId: $workflowId, actorId: $actorId)
}
