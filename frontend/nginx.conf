server {
    listen 8080;  # Non-privileged port for non-root user
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # HTTPS enforcement: Redirect HTTP to HTTPS in production
    # Note: TLS termination happens at load balancer, which sets X-Forwarded-Proto
    # This is a soft redirect - development uses HTTP, production uses HTTPS
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # X-Frame-Options is superseded by frame-ancestors in the CSP below.
    # X-XSS-Protection is obsolete in modern browsers; CSP is the correct defense.

    # Content Security Policy (delivered as HTTP header so frame-ancestors works).
    #
    # style-src keeps 'unsafe-inline' because React's inline style={{}} props
    # render as style attributes, which browsers block without unsafe-inline.
    # script-src has no unsafe-inline or unsafe-eval.
    # frame-ancestors 'none' prevents clickjacking (replaces X-Frame-Options).
    # object-src 'none' prevents plugin-based injection (Flash etc.).
    # connect-src restricts fetch/WebSocket to same-origin only; the Nginx proxy
    # forwards /graphql and /ws to the backend so the browser never needs to
    # connect directly to the backend host.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none';" always;

    # HSTS: emit unconditionally. Browsers ignore HSTS received over plain
    # HTTP per RFC 6797 §8.1, so this is safe even when the upstream load
    # balancer hasn't terminated TLS yet. Putting `add_header` inside an
    # `if` block in server context is rejected by nginx with
    # "add_header directive is not allowed here" — `if` in server only
    # allows return/rewrite/set/break/etc., not response-header directives.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Proxy GraphQL requests to the backend
    location /graphql {
        proxy_pass http://controller:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve React app
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";

        # MCP-799 (2026-05-14): repeat the server-block security headers.
        # Per nginx docs, `add_header` directives are inherited from the
        # parent level ONLY when no `add_header` exists at the current
        # level. The Cache-Control directive above disables inheritance,
        # so the server-block X-Content-Type-Options / Referrer-Policy /
        # CSP / HSTS would otherwise be DROPPED on every JS / CSS /
        # image / font response. Highest-impact gap: missing nosniff on
        # .js → MIME-sniff → XSS via mime confusion. Sibling fix to
        # MCP-798 which closed the helm-chart configmap version of the
        # same drift; this file is the docker-compose deploy path that
        # ships with `make up-dev` and the standalone container image.
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none';" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}
