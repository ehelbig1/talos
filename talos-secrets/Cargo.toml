[package]
name = "talos-secrets"
version = "0.1.0"
edition = "2021"
publish = false
license = "MIT OR Apache-2.0"

[dependencies]
zeroize = { version = "1.8", features = ["derive"] }
dashmap = "6"
uuid = { version = "1", features = ["v4"] }
async-trait = "0.1"
anyhow = "1"
tracing = "0.1"
tokio = { version = "1", features = ["sync", "rt", "macros"] }
hmac = "0.12"
sha2 = "0.10"
serde = { version = "1", features = ["derive"] }

[lints]
workspace = true
