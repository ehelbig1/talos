[package]
name = "talos-secrets-manager"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
async-trait = "0.1"
talos-integration-state = { path = "../talos-integration-state" }
aes-gcm = "0.10"
anyhow.workspace = true
base64 = "0.22"
chrono.workspace = true
dashmap = "6.1"
hex = "0.4"
hkdf = "0.12"
rand = { version = "0.8", default-features = true, features = ["std"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde.workspace = true
serde_json.workspace = true
sha2 = "0.10"
sqlx = { version = "0.8", default-features = false, features = ["postgres", "runtime-tokio-rustls", "macros", "uuid", "json", "chrono"] }
talos-config = { path = "../talos-config" }
talos-db = { path = "../talos-db" }
talos-dlp-provider = { path = "../talos-dlp-provider" }
talos-http-body = { path = "../talos-http-body" }
talos-tenancy = { path = "../talos-tenancy" }
talos-metrics = { path = "../talos-metrics" }
# MCP-1028: truncate-then-redact discipline on secret_audit_log.error_message.
talos-text-util = { path = "../talos-text-util" }
talos-workflow-job-protocol = { path = "../talos-workflow-job-protocol" }
thiserror.workspace = true
tokio = { version = "1", features = ["sync", "rt", "macros", "time"] }
tracing.workspace = true
uuid.workspace = true
zeroize = "1.8"

[lints]
workspace = true
