# Default values for Talos (Phase 2 production shape).
# -----------------------------------------------------
# Phase 2 assumptions:
#   - Postgres is EXTERNAL (e.g. RDS with pgvector enabled).
#   - Redis is EXTERNAL (e.g. ElastiCache).
#   - Neo4j may be external (AuraDB) or in-cluster — default in-cluster.
#   - NATS, Vault, MinIO are self-hosted in-cluster.
#   - Sigstore signature enforcement is ON by default.
#
# For a single-node k3s (Phase 1) deployment, layer
#   values-phase1.yaml on top of this file.
# For explicit multi-AZ production, layer values-phase2.yaml.

global:
  # Kubernetes image pull secret name(s). Reference pre-created secrets
  # that hold GHCR / ECR credentials.
  imagePullSecrets: []
  # - name: ghcr-pull

  # Name of the domain Talos is served under. Used in ingress hosts and in
  # BASE_URL / FRONTEND_URL env vars.
  domain: "talos.example.com"

  # The Kubernetes namespace the chart expects. We do not create the
  # namespace from the chart (so the operator can set PodSecurityAdmission
  # labels on it beforehand). Reference only.
  namespace: "talos"

# ----------------------------------------------------------------------------
# In-cluster TLS — terminates TLS on the self-hosted NATS / Neo4j / Postgres /
# Vault services so a RUST_ENV=production install boots through the controller's
# fail-closed transmission-security gates (PR #243). When enabled the chart
# generates a self-signed cert+key per in-cluster service (reused across
# upgrades; see templates/tls/incluster-certs.yaml) and wires the clients to
# TLS URLs (Postgres sslmode=require, Neo4j bolt+ssc://, NATS tls://, Vault
# https:// with the controller verifying the cert via VAULT_CACERT). The Vault
# leg encrypts the master-KEK wrap/unwrap traffic + the X-Vault-Token bearer,
# which previously crossed the pod network in cleartext. NOTE: the in-cluster
# Vault TLS leg was verified by `helm template` render only — see
# docs/security/operational-runbook.md "In-cluster Vault TLS" for the live
# post-deploy validation checklist before relying on it in production.
# ----------------------------------------------------------------------------
tls:
  inCluster:
    # Master toggle. Default ON so the production chart boots. Disabling it on
    # a RUST_ENV=production deployment will make the controller refuse to start
    # (the #243 gates reject plaintext nats://, bolt://, sslmode=disable). Only
    # turn this off if you front the in-cluster services with an external TLS
    # terminator / service mesh, or run a non-production (homelab) RUST_ENV.
    enabled: true
    # Validity of the chart-generated self-signed certs, in days. Certs are
    # reused across `helm upgrade` (not regenerated), so this only applies on
    # first issuance / after a manual cert-Secret deletion.
    validityDays: 3650

# ----------------------------------------------------------------------------
# Controller — Rust/Axum GraphQL + REST + MCP API server.
# Owns Postgres + Neo4j + Vault credentials.
# ----------------------------------------------------------------------------
controller:
  enabled: true
  replicaCount: 2

  # MCP-1209: deployment topology hints security_audit JWT grading.
  # Talos default = single_pod: only the controller signs/validates JWTs;
  # workers authenticate to controller via HMAC-NATS-RPC, never JWT.
  # In single_pod mode HS256 is graded "pass" (10 pts). Operators who
  # extend Talos with additional JWT-validating services should set this
  # to "microservices", which downgrades HS256 to "warn" (5 pts) to
  # encourage RS256/ES256 (asymmetric, no shared symmetric secret).
  deploymentTopology: "single_pod"

  image:
    repository: ghcr.io/OWNER/talos-controller
    # REPLACE with your published image digest.
    # Format: @sha256:<64 hex chars>. Digest pin is mandatory in production
    # (tag-only pulls are rejected by the sigstore ClusterImagePolicy below).
    digest: "sha256:PLACEHOLDER_CONTROLLER_DIGEST_REPLACE_ME"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8000
    # Controller exposes /metrics on the same port.
    metricsPath: /metrics

  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/proxy-body-size: "16m"
      # GraphQL subscriptions use WebSockets.
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    hosts:
      - host: api.talos.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: controller-tls
        hosts:
          - api.talos.example.com

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # Anti-affinity + spread across zones by default (Phase 2).
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: controller
            topologyKey: kubernetes.io/hostname

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: controller

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []

  # Non-sensitive env. Sensitive values live in controller.secrets (below)
  # and are mounted via secretKeyRef. Names must match what the Rust code
  # reads via std::env::var (see controller/src/).
  env:
    RUST_LOG: "info,controller=debug,audit_ledger=info"
    # SECURITY — in-transit TLS is FAIL-CLOSED when RUST_ENV=production.
    # The controller REFUSES TO BOOT in production unless every backend
    # connection uses TLS (transmission security: HIPAA §164.312(e) /
    # SOC2 CC6.7 / ISO A.8.24):
    #   • NATS_URL      → tls:// or nats+tls://
    #   • NEO4J_URI     → neo4j+s:// , neo4j+ssc:// , bolt+s:// or bolt+ssc://
    #   • DATABASE_URL  → ?sslmode=require (or verify-ca / verify-full)
    #   • REDIS_URL     → rediss://
    # ⚠️ The in-cluster defaults are PLAINTEXT (nats://, bolt://,
    # sslmode=disable) and are therefore INCOMPATIBLE with RUST_ENV=production.
    # For a production/compliant deployment, point these at TLS endpoints (or
    # front the in-cluster services with an mTLS service mesh). For a
    # homelab/in-cluster install on a trusted pod network, set RUST_ENV to a
    # non-production value to skip the gate (you forgo the production hardening
    # that flag also enables). There is no plaintext-in-production override.
    RUST_ENV: "production"
    # Trust X-Forwarded-For headers from cluster-internal proxies (Traefik
    # in kube-system, nginx in the frontend pod). Without this, the
    # controller rate-limits by Traefik's pod IP — every client looks
    # identical and the API_RATE_LIMIT is shared across the whole cluster,
    # producing 429s on every refocus refetch storm. Default k3s pod CIDR
    # is 10.42.0.0/16 and Service CIDR is 10.43.0.0/16 — covers both
    # ingress controller pods AND the frontend's nginx.
    # Override per-cluster if your CNI uses different CIDRs (Calico,
    # Cilium, GKE, EKS).
    TRUSTED_PROXY_CIDRS: "10.42.0.0/16,10.43.0.0/16"
    # Upstream subject prefix for the workflow engine; Talos controller and
    # worker both use `talos.*` (see docker-compose.yml comment).
    WORKFLOW_NATS_PREFIX: "talos"
    AWS_DEFAULT_REGION: "us-east-1"
    AWS_S3_FORCE_PATH_STYLE: "true"
    MINIO_BUCKET: "audit-logs"
    BCRYPT_COST: "12"
    MCP_AUTH_RATE_LIMIT: "60"
    API_RATE_LIMIT: "1000"
    WEBHOOK_RATE_LIMIT: "500"
    GLOBAL_RATE_LIMIT: "10000"
    ALLOW_DEV_UNSAFE_CSRF_BYPASS: "false"
    ENABLE_HSTS: "true"
    # KEK (key-encryption-key) backend that wraps every DEK.
    #   "vault" (default) — KMS-backed HashiCorp Vault transit; the root key
    #     never leaves Vault. Required posture for HIPAA/SOC2/ISO key management.
    #   "env"  — root key is TALOS_MASTER_KEY, living in a Secret + process
    #     memory. Convenient for a single-host / homelab install with no Vault,
    #     but recoverable by anyone with `kubectl get secret` or a heap dump.
    # SECURITY: under RUST_ENV=production the controller REFUSES TO BOOT with
    # KEK_PROVIDER=env unless TALOS_ALLOW_ENV_KEK=true is set to acknowledge the
    # weaker posture (the acceptance is logged at ERROR for audit). There is no
    # silent env-KEK-in-prod path.
    KEK_PROVIDER: "vault"
    VAULT_TRANSIT_KEY_NAME: "talos-kek"
    # Opt-in to run KEK_PROVIDER=env in production (homelab / no-Vault). Leave
    # unset for the compliant Vault-backed default. When "true", the controller
    # boots with the env master key and logs an ERROR-level audit event.
    # TALOS_ALLOW_ENV_KEK: "true"
    TALOS_DISABLE_POOLING: "true"
    # RFC 0005 S3 — tenant-isolation RLS enforcement via SET LOCAL ROLE.
    # When "true", every request-path transaction (begin_tenant_read_scoped
    # / begin_org_scoped) runs as the non-superuser `talos_app` role via a
    # per-transaction SET LOCAL ROLE (auto-resets on commit/rollback), so
    # the RFC 0004 row-level-security policies ENFORCE even when the
    # controller's DB connection is a superuser — the in-cluster Postgres
    # default, where RLS is otherwise silently bypassed. Default ON as of
    # 2026-07-06: the full integration suite runs green under enforcement,
    # and the app-layer ownership checks remain primary either way — the
    # policies now back them fail-closed instead of sitting decorative.
    #
    # PREREQUISITES (both hold on any chart-managed deploy):
    #   1. Migrations applied through
    #      20260529220000_talos_app_role.sql (creates `talos_app` + the
    #      request-path grants) — the chart's migrations Job runs these
    #      before the controller starts. The boot guard logs an ERROR if
    #      the role is missing or mis-attributed while this is on.
    #   2. The controller's connecting role is a MEMBER of `talos_app`
    #      (the migration grants this to the role that runs it). If your
    #      migrations run as a DIFFERENT DB user than the controller,
    #      verify with `scripts/rls-preflight.sh` before upgrading.
    # After upgrade, confirm the controller logs "RLS SET-ROLE mode
    # active" (INFO) at boot and run `make smoke`.
    # Rollback is instant and data-safe: set "false" and restart —
    # enforcement is per-transaction, no migration to undo.
    TALOS_RLS_SET_ROLE: "true"
    # JWT audience-claim enforcement (MCP-857): fail closed on tokens
    # missing `aud=talos` (defense vs. cross-audience JWT replay — see
    # talos-auth/src/lib.rs `verify_token`). Default ON as of 2026-07-06:
    # the issuer has stamped `aud` since 2026-05, so any aud-less token
    # aged out of circulation one access-token TTL (15 min) after that
    # deploy. If upgrading from a pre-2026-05 build, upgrade first with
    # this set to "false", wait one TTL while watching the
    # `jwt_legacy_aud_less_verify` telemetry event hit zero, then re-set
    # to "true". Rollback is instant: set "false" and restart.
    JWT_REQUIRE_AUD: "true"
    # ── RFC 0010 worker-trust (P1 Ed25519 + P3 envelope sealing) ─────
    # Enablement runbook (canaried on the dev stack 2026-07-06, incl. a
    # sealed-secret round-trip proven end-to-end under "required"):
    #   1. Keys: `controller generate-worker-trust-keypair --role
    #      controller` and `--role worker --worker-id <id>`. Put
    #      TALOS_CONTROLLER_SIGNING_KEY + TALOS_WORKER_SIGNING_KEY in
    #      the bootstrap Secret (both render as optional secretKeyRefs);
    #      the two PUBLIC halves go in these env maps (below + worker.env).
    #   2. Uncomment TALOS_DISPATCH_SCHEME + the public-key entries and
    #      `helm upgrade`. Verify jobs run (controller logs "dispatch
    #      signing scheme = Ed25519").
    #   3. Set TALOS_ENVELOPE_SEALING: "audit" on BOTH env maps; verify a
    #      secret-carrying workflow (e.g. a vault:// header module) runs.
    #      Controller logs "claim responder started".
    #   4. Flip both to "required" — workers now refuse an inline-WSK
    #      downgrade (no-secret nodes still run). Rollback at any step:
    #      revert the values and upgrade; "off" is byte-identical legacy.
    # TALOS_DISPATCH_SCHEME: "ed25519"
    # Static registry of worker Ed25519 public keys (worker_id=hex pairs,
    # comma-separated). Alternative: dynamic self-registration via
    # controller.workerRegistration + networkPolicy.workerRegistrationIngress.
    # TALOS_WORKER_PUBLIC_KEYS: "fleet=<64-hex from keygen --role worker>"
    # off | audit | required — RFC 0010 P3 per-execution secret sealing.
    # TALOS_ENVELOPE_SEALING: "audit"
    # Redis-backed distributed replay-nonce guard (codebase-review finding
    # #2). Per-process nonce caches already stop within-replica replay; this
    # makes signed-message single-use hold ACROSS controller replicas — a
    # captured RPC replayed to a different replica inside the 60 s freshness
    # window is rejected via a shared `SET NX PX` in Redis. Default ON
    # (2026-07-06): Redis is already a required, prod-TLS-gated dependency,
    # and at one replica the guard is inert-but-proven, so scaling out can't
    # silently forget it. On Redis outage the guard fails OPEN by default
    # (HMAC + freshness + per-replica caches still enforce; only the
    # cross-replica single-use add-on degrades) — flip the second knob to
    # refuse RPC entirely when Redis is unreachable, if your posture
    # prefers unavailability over the 60 s replay window.
    TALOS_DISTRIBUTED_REPLAY: "true"
    # TALOS_REPLAY_FAIL_CLOSED: "true"
    # Bootstrap-time first-admin pin (MCP-859). STRONGLY RECOMMENDED
    # for any deployment exposed to the public internet BEFORE the
    # operator's own signup completes. When set, ONLY a user
    # registering with this email can claim the automation-node
    # ceiling bootstrap promotion — closes the "attacker registers
    # first" race (talos-auth/src/bootstrap.rs::pinned_email). Leave
    # unset for private/compose-only deploys where no one can beat
    # the operator to /auth/register. Trim + lowercase happens
    # automatically; empty string is treated as unset.
    # BOOTSTRAP_FIRST_USER_EMAIL: "admin@example.com"
    # All EMBEDDING_* config (URL/KEY/MODEL/DIMENSIONS/MAX_RPM) lives in the
    # bootstrap secret as of r241 so operators can rotate providers without
    # editing the chart. The controller's `EmbeddingConfig::from_env`
    # supplies sensible defaults when keys are unset (or empty-string).
    # See deploy/helm/talos/templates/controller/deployment.yaml for the
    # secretKeyRef wiring.

  # OCI registry source for module templates. When set, the controller skips
  # the disk-bundled template seeding (`module-templates/` baked into the
  # image) and pulls catalog metadata from the registry instead. The worker
  # pulls the actual WASM bytes at execution time via the same URL prefix.
  #
  # Default (empty) → disk seeding only. Set to a registry URL to switch to
  # the OCI source-of-truth model (recommended for production multi-instance
  # deploys).
  #
  #   ociRegistry:
  #     url: "https://ghcr.io"
  #     namespace: "OWNER/talos-tools"   # path prefix under the registry
  #
  # Templates are then pulled from `{url}/v2/{namespace}/_index/manifests/latest`
  # for discovery. See .github/workflows/template-publish.yml for the
  # publish flow.
  #
  # PRIVATE PACKAGES: set bootstrapSecret.data.OCI_REGISTRY_USERNAME +
  # OCI_REGISTRY_PASSWORD (MCP-860). Both controller and worker mount
  # these via secretKeyRef; empty falls back to Anonymous auth.
  ociRegistry:
    url: ""
    namespace: ""

  # ------------------------------------------------------------------
  # WORM audit-ledger persistence to S3 / MinIO with Object Lock.
  # ------------------------------------------------------------------
  # The controller batches every cryptographic-ledger event from the
  # WASM workers (`talos.audit.ledger` NATS subject — secret access,
  # capability denials, etc.) and uploads to MinIO / S3 every 5s or
  # every 100 events.
  #
  # When `s3ObjectLock.enabled: true` the upload sets Object Lock in
  # `Compliance` mode with the configured retention. The bucket MUST
  # have Object Lock enabled at creation time (it CANNOT be turned on
  # for an existing bucket — AWS / MinIO restriction). Compliance mode
  # means even an account root user cannot remove the object until the
  # retention date — the right default for tamper-evident audit.
  #
  # Leave `enabled: false` if your bucket lacks Object Lock support;
  # the cryptographic hash chain on each event still provides local
  # tamper evidence even without WORM at the storage tier.
  audit:
    s3ObjectLock:
      enabled: false
      retentionDays: 2555     # 7 years; clamped to [1, 36500] at runtime
    # Continuous WORM chain-verification sweep. The controller re-verifies
    # the HMAC + hash chain of recently-completed executions on this
    # interval and logs `audit_chain_verification_failed` (target
    # `talos_audit`) for any tamper/deletion/reorder — page on it in your
    # SIEM. Default 3600s (1h), clamped to [300, 86400] at runtime; set to
    # 0 to disable. No-op unless a WORM endpoint (S3/MinIO) is configured.
    # Verification also requires TALOS_AUDIT_SIGNING_KEY on workers + the
    # controller (see the bootstrap secret); without it events persist but
    # are flagged UNVERIFIED.
    chainSweepIntervalSecs: 3600

  # RFC 0010 P2: dynamic worker Ed25519 self-registration
  # (POST /internal/worker-key). Three pieces cooperate:
  #   1. bootstrapSecret.data.TALOS_WORKER_REGISTRATION_TOKEN — the
  #      fleet-shared bearer. The chart always renders it into the controller
  #      AND worker pods as an OPTIONAL secretKeyRef, so adding the key to the
  #      bootstrap Secret (plus toggle 3 below) is all a shared-token rollout
  #      needs. Absent key = env unset = endpoint not mounted (fail-closed).
  #   2. `requireBoundToken` below — the hardened end-state. When true the
  #      controller sets TALOS_WORKER_REG_REQUIRE_BOUND_TOKEN=1: ONLY
  #      single-use, worker_id-bound provisioning tokens (minted via
  #      `controller mint-worker-provisioning-token`) may register; the
  #      fleet-shared token and wildcard tokens are refused. The endpoint
  #      mounts even without the shared token in this mode. Each worker then
  #      carries its own minted token via worker.extraEnv (or a per-worker
  #      Secret) instead of the bootstrap-secret bearer.
  #   3. networkPolicy.workerRegistrationIngress.enabled — network-layer
  #      opt-in so worker pods can reach the controller port at all.
  # Registration is trust-on-first-use per worker_id; key rotation goes
  # through the register-worker-identity CLI or a bound provisioning token.
  workerRegistration:
    requireBoundToken: false

  # Extra arbitrary env vars rendered as name/value pairs into the Deployment.
  # Use this for non-sensitive per-deploy overrides.
  extraEnv: []
  # - name: ENABLE_EDGE_ROUTING
  #   value: "true"

  # Volume config — the controller writes runtime compilation artifacts.
  # We mount an emptyDir (in-memory by default) so readOnlyRootFilesystem
  # remains enabled.
  compilationCache:
    # Use `emptyDir` for ephemeral scratch; set to "persistent" with a PVC
    # if you want cached compiler output across restarts.
    type: emptyDir
    sizeLimit: "2Gi"

  # Ports the container exposes (in addition to the service port).
  ports: []

  serviceAccount:
    create: true
    # If the install environment needs Workload Identity / IRSA for
    # reaching an external VAULT_ADDR or S3 bucket, patch annotations here.
    annotations: {}

# ----------------------------------------------------------------------------
# Worker — wasmtime-backed sandbox. Credential-free.
# ----------------------------------------------------------------------------
worker:
  enabled: true
  replicaCount: 2

  image:
    repository: ghcr.io/OWNER/talos-worker
    digest: "sha256:PLACEHOLDER_WORKER_DIGEST_REPLACE_ME"
    pullPolicy: IfNotPresent

  service:
    # Headless for potential NATS-based worker discovery; no traffic
    # is routed here today (worker is a subscriber, not a server).
    type: ClusterIP
    clusterIP: None
    # /metrics for Prometheus scrape.
    metricsPort: 9090

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: worker
            topologyKey: kubernetes.io/hostname

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: worker

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []

  env:
    RUST_LOG: "info,worker=debug"
    RUST_ENV: "production"
    # AWS_DEFAULT_REGION + AWS_S3_FORCE_PATH_STYLE are read transparently
    # by the AWS SDK when modules use the object_storage WIT capability
    # against the in-cluster MinIO. Both are SDK-implicit so there's no
    # `std::env::var` call in worker code.
    AWS_DEFAULT_REGION: "us-east-1"
    AWS_S3_FORCE_PATH_STYLE: "true"
    # MCP-856 (2026-05-14): `MINIO_BUCKET` removed from the worker env
    # block. The worker has no audit-ledger dep (talos-audit-ledger is
    # controller-only) and no Rust code reads `MINIO_BUCKET` from env.
    # Bucket name on the worker's object_storage path comes from per-call
    # args inside the WIT host functions, not env. The header comment on
    # the worker deployment template mentioned "MinIO creds (signed
    # audit-log writes)" but that's stale — the worker doesn't write
    # audit logs to MinIO; the controller does (via talos-audit-ledger,
    # which DOES read MINIO_BUCKET).
    METRICS_PORT: "9090"
    TALOS_DISABLE_POOLING: "true"
    # WORKER_ALLOW_PRIVATE_HOST_TARGETS gates module HTTP calls to
    # RFC1918 hostnames. Leave `false` on multi-tenant deployments.
    WORKER_ALLOW_PRIVATE_HOST_TARGETS: "false"
    # ── RFC 0010 worker-trust (P1 Ed25519 + P3 envelope sealing) ─────
    # Worker half of the enablement runbook documented at
    # controller.env TALOS_ENVELOPE_SEALING. Uncomment together with
    # the controller half; TALOS_WORKER_SIGNING_KEY comes from the
    # bootstrap Secret (optional secretKeyRef in the deployment).
    # Public half of the controller's dispatch-signing keypair
    # (safe to put in values — it is not a secret):
    # TALOS_CONTROLLER_PUBLIC_KEY: "<64-hex from keygen --role controller>"
    # Fleet identity the controller looks this worker's public key up
    # under (single-key fleet; per-worker identities go via extraEnv):
    # TALOS_WORKER_ID: "fleet"
    # Keep in lockstep with controller.env TALOS_ENVELOPE_SEALING; the
    # worker enforces the inline-WSK downgrade guard under "required".
    # TALOS_ENVELOPE_SEALING: "required"
    # ── Per-actor write ceiling (mutation-permission gate) ───────────
    # When "1"/"true", the worker refuses every data-mutating host op
    # (agent-memory writes, non-GET HTTP, DB mutations, webhook/email/
    # messaging sends, object-storage put/delete, integration-state
    # writes) for any actor whose `max_write_ceiling` is `readonly`
    # (set via the `set_actor_write_ceiling` operator tool). Default
    # off: the signed ceiling travels on every job but changes nothing
    # until enabled — a staged rollout, same shape as the tier ceiling.
    # Read once at boot; controller side needs no change (the field is
    # already HMAC-bound on every JobRequest). Worker-only env.
    # TALOS_WRITE_CEILING_ENFORCED: "1"

  # Sigstore enforcement for OCI template signatures. The publish workflow
  # (.github/workflows/template-publish.yml) signs every artifact via
  # cosign keyless using the workflow's GitHub OIDC token. The worker
  # verifies signatures BEFORE pulling the WASM bytes — unsigned or
  # tampered artifacts are rejected when `required: true`.
  #
  # Modes (TALOS_SIGSTORE_REQUIRED env value):
  #   "" / "false"  → Disabled — don't verify (dev / first-deploy).
  #   "audit"       → Verify, log on failure, continue. Migration window.
  #   "true"        → Verify, refuse on failure. Production.
  #
  # `identityRegexp` MUST be set when not Disabled. It's matched against
  # the SAN URI of the Fulcio cert; pin to the workflow URL pattern so
  # only artifacts signed by THIS repo's publish workflow are accepted.
  # Default `oidcIssuer` is the GitHub Actions OIDC endpoint.
  sigstore:
    required: ""              # "" | "audit" | "true"
    identityRegexp: ""        # e.g. "^https://github\\.com/OWNER/talos/\\.github/workflows/template-publish\\.yml@"
    oidcIssuer: "https://token.actions.githubusercontent.com"

  extraEnv: []

  serviceAccount:
    create: true
    annotations: {}

# ----------------------------------------------------------------------------
# Frontend — React/TS SPA served by nginx.
# ----------------------------------------------------------------------------
frontend:
  enabled: true
  replicaCount: 2

  image:
    repository: ghcr.io/OWNER/talos-frontend
    digest: "sha256:PLACEHOLDER_FRONTEND_DIGEST_REPLACE_ME"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 3000

  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: talos.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: frontend-tls
        hosts:
          - talos.example.com

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

# ============================================================================
# External services — Phase 2 default is "bring your own".
# Fill in the URIs; the chart will render them into controller/worker Secrets.
# ============================================================================

postgres:
  # Two mutually-exclusive modes:
  #
  # 1. `enabled: false` (default, recommended for any multi-node /
  #    managed deployment): operator wires DATABASE_URL in
  #    bootstrapSecret pointing at a managed Postgres (Neon, RDS,
  #    Cloud SQL, etc.).
  #
  # 2. `enabled: true` (single-node / homelab): chart deploys a
  #    standalone Postgres StatefulSet on the same cluster, backed
  #    by a local-path PVC. NOT replicated — single replica, no
  #    PITR, daily pg_dump only. Suitable for personal / prototype
  #    Talos installs where running an external managed Postgres
  #    isn't desirable. install.sh exposes the `TALOS_USE_INTERNAL_
  #    POSTGRES=yes` toggle to opt in.
  enabled: false

  image:
    # The pgvector team's official image — Debian-based, derived
    # from `postgres:17`, with the pgvector extension compiled in.
    # Required because the Talos schema uses `vector(N)` columns
    # (actor_memory.embedding, semantic_execution_cache, etc.) and
    # the stock postgres image doesn't ship pgvector. The schema's
    # `CREATE EXTENSION IF NOT EXISTS vector` is wrapped in
    # `EXCEPTION WHEN OTHERS THEN` so it silently no-ops if the
    # extension isn't available — then the next migration that
    # uses `vector(1536)` fails with "type vector does not exist".
    #
    # NOT Bitnami — Bitnami changed their free-image policy in
    # late 2025 and many public images now redirect to a paid
    # registry. NOT pgvector/pgvector:pg17-alpine — no alpine
    # variant is published by the pgvector team.
    #
    # Postgres user in this image is uid/gid 999 (Debian
    # convention), NOT 70 (Alpine). The StatefulSet's
    # securityContext is set accordingly.
    repository: pgvector/pgvector
    tag: "pg17"
    # Pin to a digest in production. Compose with `docker manifest
    # inspect pgvector/pgvector:pg17 | jq -r '.config.digest'`.
    digest: ""
    pullPolicy: IfNotPresent

  auth:
    # All three of these are consumed via secretKeyRef from a Secret
    # named `<release>-talos-postgres-credentials`. install.sh
    # generates the password at first install; subsequent installs
    # reuse the existing Secret (`helm.sh/resource-policy=keep`).
    username: "talos"
    database: "talos"
    # Set automatically by install.sh; leave empty in values.yaml so
    # `helm template` against a clean checkout doesn't render a
    # plaintext placeholder.
    password: ""
    passwordSecret:
      # Whether the chart should EMIT the credentials Secret. install.sh
      # always creates it out-of-band (so plaintext never round-trips
      # through `helm get values`) and sets this to false. `helm
      # template` smoke tests can flip it on by passing
      # `--set postgres.auth.password=<dummy>` along with this flag.
      create: false

  persistence:
    enabled: true
    # k3s default (local-path) is correct for single-node. For
    # multi-node clusters, pin to a network-attached class
    # (ebs-gp3 / persistent-disk-balanced / azuredisk-csi).
    storageClass: ""
    size: "20Gi"

  resources:
    # Calibrated for a 4 GiB VM where Postgres shares the host with
    # worker, controller, NATS, Neo4j, MinIO, Vault, frontend.
    # 1 GiB hard cap pairs with shared_buffers=256MB in
    # postgresql.conf — leaves ~512 MiB for OS page cache /
    # connection backends / WAL buffers.
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1500m"
      memory: 1Gi

  # postgresql.conf tuning. Each value falls back to the in-template
  # default when omitted; override here only when you have a
  # workload-specific reason. See templates/postgres/configmap.yaml
  # for the units + rationale per knob.
  config:
    maxConnections: 60
    sharedBuffers: "256MB"
    effectiveCacheSize: "512MB"
    workMem: "4MB"
    maintenanceWorkMem: "64MB"
    maxWalSize: "2GB"

  backup:
    enabled: true
    # 03:00 UTC daily — quiet hour for the user-facing workflow
    # schedules (no scheduled cron entries between 02-05 UTC in the
    # default Talos workflow set).
    schedule: "0 3 * * *"
    activeDeadlineSeconds: 1800
    # Keep the last N dumps. With ~10 MiB/dump for a modest Talos
    # install, 7 dumps fit comfortably inside a 10 GiB PVC.
    retentionCount: 7
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
    persistence:
      # ALWAYS leave this on outside `helm template` smoke tests.
      # emptyDir backups die with the pod and defeat the purpose.
      enabled: true
      storageClass: ""
      size: "10Gi"

  # For the `enabled: false` path the operator points the chart at
  # an external managed Postgres via bootstrapSecret.data.DATABASE_URL.
  # Kept here for documentation only; the chart doesn't consume this
  # field — install.sh writes the connection string directly into the
  # bootstrap Secret.
  #
  # SECURITY: under RUST_ENV=production the DATABASE_URL MUST carry
  # ?sslmode=require (or verify-ca / verify-full) — the controller refuses to
  # boot otherwise. sslmode absent/disable/allow/prefer does not guarantee TLS.
  # Example: postgres://user:pass@host:5432/talos?sslmode=verify-full
  external:
    url: ""

redis:
  external:
    # Example: rediss://:PASSWORD@redis.example.com:6379 (TLS)
    url: ""

# ----------------------------------------------------------------------------
# NATS — self-hosted in-cluster (both phases).
# ----------------------------------------------------------------------------
nats:
  enabled: true
  replicaCount: 3

  image:
    repository: nats
    tag: "2.10-alpine"
    digest: "sha256:b83efabe3e7def1e0a4a31ec6e078999bb17c80363f881df35edc70fcb6bb927"
    pullPolicy: IfNotPresent

  # MCP-894 (2026-05-14): PDB enabled by default for the 3-replica
  # NATS cluster. Without it, a `kubectl drain` (node upgrade,
  # capacity rebalance) could evict 2 of 3 NATS pods at once, taking
  # the cluster below quorum and breaking worker↔controller
  # signed-RPC traffic for the duration of the eviction. Sibling to
  # controller / worker / frontend PDBs which already ship.
  # minAvailable: 2 keeps majority during voluntary disruption.
  podDisruptionBudget:
    enabled: true
    minAvailable: 2

  persistence:
    enabled: true
    storageClass: ""
    size: "20Gi"

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  service:
    clientPort: 4222
    clusterPort: 6222
    monitorPort: 8222

  jetstream:
    enabled: true
    # max_memory_store / max_file_store accept bare bytes as int64. We pass
    # integers (no unit suffix) so NATS' parser doesn't have to interpret
    # any suffix at all — earlier "512Mi" / "512MB" attempts hit
    # `strconv.ParseInt: parsing "512M": invalid syntax`. Values match the
    # previous Mi/Gi caps in raw bytes.
    maxMemoryStore: 536870912        # 512 MiB
    maxFileStore: 10737418240        # 10 GiB

# ----------------------------------------------------------------------------
# Neo4j — in-cluster by default. In Phase 2, set `enabled: false` and
# supply an AuraDB URI via `neo4j.external.uri`.
# ----------------------------------------------------------------------------
neo4j:
  enabled: true

  image:
    repository: neo4j
    tag: "5.26-community"
    digest: "sha256:b357872da95a164c5243ca8d9060601130717ff43cee3c829402fab46209a412"
    pullPolicy: IfNotPresent

  persistence:
    enabled: true
    storageClass: ""
    size: "50Gi"

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

  heap:
    initial: "512m"
    max: "1g"

  external:
    # When `neo4j.enabled` is false, this URI is used instead.
    # Format: neo4j+s://dbid.databases.neo4j.io (AuraDB) or bolt://host:7687
    uri: ""

# ----------------------------------------------------------------------------
# HashiCorp Vault — self-hosted in-cluster (Phase 1). In Phase 2 the
# recommended path is HCP Vault; set `vault.enabled: false` and point
# VAULT_ADDR via the controller secret.
# ----------------------------------------------------------------------------
vault:
  enabled: true

  # IPC_LOCK capability for mlock(). Default false because:
  #   - Adding any capability is rejected by PodSecurityAdmission `restricted`,
  #     which the install.sh labels the namespace with by default.
  #   - The Vault HCL pins `disable_mlock = true`, so Vault won't actually call
  #     mlock() even if granted the cap.
  #   - k3s nodes ship without swap, so paging risk is moot.
  # Flip true only when running this namespace at PSA `baseline` AND the host
  # has swap enabled AND you've also flipped `disable_mlock = false` in the
  # vault.hcl ConfigMap.
  allowMemoryLocking: false

  image:
    repository: hashicorp/vault
    tag: "1.18"
    digest: "sha256:750bb37c1638fa194ab37053a81618c61bb0491ddec6fccac87c07a8e6cd8166"
    pullPolicy: IfNotPresent

  persistence:
    enabled: true
    storageClass: ""
    size: "10Gi"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Init job — two-phase bootstrap on each apply:
  #   Phase 1 (vault image): initialize on first boot / unseal otherwise,
  #     enable transit engine, create the KEK key, write the
  #     `talos-controller` policy (transit/encrypt + decrypt + read against
  #     the KEK key only — least privilege), mint an orphan periodic
  #     `talos-controller` token under that policy.
  #   Phase 2 (kubectl image): patch the bootstrap Secret's VAULT_TOKEN
  #     with the new least-privilege token (only if it's a known
  #     placeholder — `__pending_vault_init__`, `dev-root`, or empty),
  #     then trigger a controller rollout so envFromSecret picks up the
  #     new value at the next pod start.
  init:
    enabled: true
    # kubectl image used by the secret-patcher container. Pin to the
    # k3s minor version when possible.
    #
    # Image-choice history:
    # 1. `bitnami/kubectl:1.31` — original. Stopped working in late
    #    2025 when Bitnami moved public images to a paid registry.
    # 2. `rancher/kubectl:v1.31.4` — failed at runc with "exec:
    #    /bin/sh: no such file or directory". The image is a
    #    scratch-style minimal layout with only the kubectl binary;
    #    no shell at all. Doesn't work for our script-based
    #    secret-patcher.
    # 3. `alpine/k8s:1.31.4` — current default. Alpine-based,
    #    community-maintained at github.com/alpine-docker/k8s,
    #    bundles kubectl + helm + sh + bash + jq + awk + curl. Free.
    #    Aligns with k3s minor version. This is the canonical "I
    #    need kubectl in a CI/init Job" image in the k8s
    #    ecosystem post-bitnami.
    kubectlImage:
      repository: alpine/k8s
      tag: "1.31.4"
      pullPolicy: IfNotPresent
    # MCP-898 (2026-05-14): explicit resources for the init Job's two
    # containers. Pre-fix neither carried `resources:`, putting the
    # Pod in BestEffort QoS — first to be OOM-killed under any node
    # memory pressure. The vault-bootstrap initContainer runs
    # `vault operator init` / `unseal` / `secrets enable transit` /
    # `policy write` / `token create` and writes the
    # talos-controller token to /tmp; an OOM-kill between
    # `vault operator init` succeeding and the unseal key being
    # captured leaves Vault initialized but the key lost (the JSON
    # output is parsed in shell, not persisted before parse) →
    # cluster permanently broken, requires PVC restore from backup.
    # Override sizing here if your cluster runs at high memory
    # pressure and you've observed Burstable evictions too.
    resources:
      bootstrap:
        requests:
          cpu: 50m
          memory: 96Mi
        limits:
          cpu: 200m
          memory: 256Mi
      secretPatcher:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
    # bootstrap.json (unseal key + root token) lives on the Vault PVC
    # under /vault/file/bootstrap.json. Do NOT copy it into a
    # release-owned Kubernetes Secret — that would tie key material to
    # release lifecycle.

  # Address used by the controller. When vault.enabled=true, this resolves
  # to the in-cluster Service DNS; otherwise set to your HCP Vault addr.
  addrOverride: ""

# ----------------------------------------------------------------------------
# MinIO — self-hosted S3-compatible object storage (audit logs, artifacts).
# ----------------------------------------------------------------------------
minio:
  enabled: true

  image:
    repository: minio/minio
    tag: "latest"
    digest: "sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e"
    pullPolicy: IfNotPresent

  persistence:
    enabled: true
    storageClass: ""
    size: "100Gi"

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

  service:
    apiPort: 9000
    consolePort: 9001

  bucket: "audit-logs"

# ----------------------------------------------------------------------------
# Ollama — optional local LLM inference (tier-1 actor data-privacy gate).
# Skip in Phase 2 unless GPU nodes are available.
# TODO: GPU support is not wired up in this chart (no nvidia.com/gpu
# resource request). Add when Phase 2 adds GPU nodes.
# ----------------------------------------------------------------------------
ollama:
  enabled: false
  image:
    repository: ollama/ollama
    tag: "latest"
    digest: "sha256:PLACEHOLDER_OLLAMA_DIGEST_REPLACE_ME"
  persistence:
    enabled: true
    size: "50Gi"
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 8Gi

# ----------------------------------------------------------------------------
# Graph-RAG (Neo4j knowledge-graph triple extraction)
# ----------------------------------------------------------------------------
graphRag:
  # Ollama model for LOCAL triple extraction (used when no anthropic/api_key
  # is configured). Empty → controller code default (qwen2.5:7b). 1B-class
  # models are flaky at structured JSON; use a 7B-class instruct model if the
  # knowledge graph matters. The model must be pulled in the target Ollama.
  model: ""
  # Operator attestation that OLLAMA_URL resolves ON-HOST. When true, tier1
  # (local-only / "data must not leave host") actors get graph extraction via
  # the LOCAL Ollama backend ONLY — never an external provider. Leave false
  # unless you can vouch that the Ollama endpoint does not leave the host.
  tier1LocalOk: false

# ----------------------------------------------------------------------------
# Migrations — one-shot sqlx migrate job, pre-install & pre-upgrade hook.
# Uses the same image as the controller.
# ----------------------------------------------------------------------------
migrations:
  enabled: true
  # Override if you want to pin a separate image; defaults to the controller.
  image:
    repository: ""
    digest: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  backoffLimit: 2
  # Time after which Helm deletes the Job object after completion.
  activeDeadlineSeconds: 900

# ----------------------------------------------------------------------------
# Security — sigstore image-signature enforcement.
# ----------------------------------------------------------------------------
security:
  sigstore:
    # Requires the `policy-controller` admission webhook (sigstore.dev)
    # already installed in the cluster. See chart README for install
    # instructions and how to disable this when publishing unsigned
    # dev images.
    enabled: true
    # Only images in these globs must be signed. Wildcarded to allow
    # private registry mirrors; tighten for your environment.
    imageGlobs:
      - "ghcr.io/OWNER/talos-*"
    # GitHub Actions OIDC identity that signs the releases.
    githubOrg: "OWNER"
    githubRepo: "talos"
    # The refs allowed to sign (releases + main).
    certIdentityRegex: "^https://github\\.com/OWNER/talos/\\.github/workflows/.+@refs/(heads/main|tags/v.+)$"
    oidcIssuer: "https://token.actions.githubusercontent.com"

# ----------------------------------------------------------------------------
# NetworkPolicies — enable default-deny + per-service allow rules.
# ----------------------------------------------------------------------------
networkPolicy:
  enabled: true
  # Namespace selector used when allowing ingress-controller traffic.
  ingressNamespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: "ingress-nginx"
  # MCP-896 (2026-05-14): scrape pods are restricted via this selector
  # instead of the previous `podSelector: {}` "allow any pod in
  # namespace" anti-pattern. The controller multiplexes /metrics,
  # /metrics/prometheus, /graphql, /mcp, and /auth/* onto a single port
  # (Service exposes only `http: 8000`), so the old rule silently
  # granted every in-namespace pod access to the full API surface, not
  # just the scrape endpoints. Same fix applied to worker + nats
  # NetworkPolicies (those at least had separate metrics ports, but the
  # principle is identical — lateral-movement blast radius).
  #
  # Default matches the kube-prometheus-stack convention of labeling
  # the monitoring namespace `kubernetes.io/metadata.name: monitoring`.
  # Override for in-namespace Prometheus deploys or non-standard
  # labels. Setting `enabled: false` removes the scrape ingress rule
  # entirely (Prometheus must run via a service-mesh sidecar or
  # out-of-cluster pull in that case).
  monitoringIngress:
    enabled: true
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: "monitoring"
  # RFC 0010 P2 inc.4c: allow worker pods to reach the controller for
  # POST /internal/worker-key (dynamic Ed25519 self-registration). OFF by
  # default — enabling it opens controller:8000 to workers at the network
  # layer (the endpoint's bearer-token + proof-of-possession auth is the real
  # gate). Turn on only alongside a registration credential — the
  # bootstrap-Secret TALOS_WORKER_REGISTRATION_TOKEN and/or
  # controller.workerRegistration.requireBoundToken (see that block for the
  # full rollout story); leave off for the static TALOS_WORKER_PUBLIC_KEYS or
  # register-worker-identity CLI path.
  workerRegistrationIngress:
    enabled: false
  # CIDRs the controller is allowed to reach for outbound LLM / SaaS calls.
  # Restrict in production to the exact hostnames' IP ranges if desired.
  externalEgressCIDRs:
    - "0.0.0.0/0"

# ----------------------------------------------------------------------------
# Monitoring — Prometheus Operator integration (MCP-904).
# ----------------------------------------------------------------------------
#
# When enabled, the chart creates two ServiceMonitor CRDs (one for the
# controller, one for the worker) so that a Prometheus Operator install
# auto-discovers and scrapes Talos /metrics endpoints. REQUIRES the
# `monitoring.coreos.com/v1` CRDs already installed in the cluster (via
# kube-prometheus-stack or prometheus-operator) — without them, the
# manifests are rejected by the API server and `helm install` fails.
#
# Bearer tokens are read from the same bootstrap Secret keys the
# controller / worker consume:
#   controller → PROMETHEUS_SCRAPE_TOKEN  (bootstrapSecret.data)
#   worker     → METRICS_AUTH_TOKENS      (bootstrapSecret.data)
# Both must be set to non-empty values OR the scrape endpoint returns
# 403 (controller) / 401 (worker, post MCP-902).
#
# The NetworkPolicy `monitoringIngress` block (above) governs which
# pods are allowed to REACH the scrape ports. The two settings must
# agree: by default `monitoringIngress.namespaceSelector` matches
# `kubernetes.io/metadata.name: monitoring`, which is the kube-
# prometheus-stack convention. Operators running Prometheus in a
# different namespace must update BOTH selectors.
monitoring:
  serviceMonitor:
    enabled: false
    # Scrape cadence; kube-prometheus-stack default is 30s.
    interval: 30s
    scrapeTimeout: 10s
    # Override the bootstrap Secret keys if your External-Secrets
    # operator stores them under different names.
    controllerTokenSecretKey: PROMETHEUS_SCRAPE_TOKEN
    workerTokenSecretKey: METRICS_AUTH_TOKENS
    # Optional extra labels propagated onto the ServiceMonitor object —
    # kube-prometheus-stack defaults to scraping ServiceMonitors with
    # `release: <prometheus-release-name>`, so most operators need:
    #   monitoring:
    #     serviceMonitor:
    #       extraLabels:
    #         release: kube-prometheus-stack
    extraLabels: {}
  # PrometheusRule: ship the alert rules (canonical source lives at
  # files/alerts.yaml in this chart, symlinked from
  # deploy/observability/alerts.yaml) as a PrometheusRule CRD so they
  # deploy WITH the release instead of being applied by hand. Requires
  # the monitoring.coreos.com/v1 CRDs (kube-prometheus-stack /
  # prometheus-operator). Off by default so the chart still renders on
  # clusters without those CRDs.
  prometheusRule:
    enabled: false
    # kube-prometheus-stack selects PrometheusRules by a release label,
    # same as ServiceMonitors — most operators need e.g.
    #   extraLabels:
    #     release: kube-prometheus-stack
    extraLabels: {}

# ----------------------------------------------------------------------------
# Bootstrap Secret — seed values injected on first install.
# For production, set `bootstrapSecret.enabled: false` and wire
# External Secrets Operator to populate the Secret named by
# `secretName` instead. The chart only *consumes* that Secret by name;
# it does not force re-create it on upgrade when `enabled: false`.
# ----------------------------------------------------------------------------
bootstrapSecret:
  enabled: true
  secretName: "talos-controller-secrets"
  # ALL keys below MUST be populated before `helm install`. Leaving a key
  # empty renders an empty Secret field; the controller will crash on
  # startup with a clear "X required" error (per docker-compose.yml).
  data:
    # Postgres + Redis URIs (full connection strings)
    DATABASE_URL: ""
    REDIS_URL: ""
    # NATS basic auth
    NATS_USER: ""
    NATS_PASSWORD: ""
    # Neo4j credentials
    NEO4J_USER: "neo4j"
    NEO4J_PASSWORD: ""
    # Envelope encryption — AES-256-GCM master key; base64 of 32 bytes
    # from `openssl rand -base64 32`. Only used when KEK_PROVIDER=env.
    # Also stays wired as the legacy-read fallback when KEK_PROVIDER=vault.
    TALOS_MASTER_KEY: ""
    # Vault — in-cluster Vault: the chart's vault-init Job mints a
    # least-privilege `talos-controller` token (transit/encrypt + decrypt
    # against the KEK key only) and patches the bootstrap Secret with it
    # on each apply. The placeholder `__pending_vault_init__` is what
    # install.sh seeds; vault-init replaces it during install.
    # HCP / external Vault: replace with an AppRole / identity-issued
    # token; the chart's init logic refuses to patch operator-set values.
    VAULT_TOKEN: "__pending_vault_init__"
    # JWT signing (HS256 secret, or see JWT_PRIVATE_KEY/JWT_PUBLIC_KEY
    # for RS256 — set JWT_ALGORITHM accordingly in controller.extraEnv).
    JWT_SECRET: ""
    # Worker ↔ controller NATS-RPC HMAC key
    # Generate with: openssl rand -hex 32
    WORKER_SHARED_KEY: ""
    # Audit event signing (tamper-evident trail)
    # Generate with: openssl rand -hex 32
    TALOS_AUDIT_SIGNING_KEY: ""
    # Worker /metrics + /health bearer-token auth (MCP-902). REQUIRED for
    # worker startup — `metrics_server::start_metrics_server` panics
    # via `.expect("Failed to start metrics server — ensure
    # METRICS_AUTH_TOKENS is set")` when the env var is unset OR empty
    # OR contains only whitespace. Pre-fix the chart wired the
    # secretKeyRef on worker/deployment.yaml with optional:true but
    # never defined the key in bootstrapSecret.data → `helm install`
    # produced a CrashLoopBackOff worker out of the box. Comma-
    # separated list; generate one with `openssl rand -hex 32`. The
    # controller's equivalent is PROMETHEUS_SCRAPE_TOKEN (separate
    # token, separate scrape config). For External Secrets operators
    # with `bootstrapSecret.enabled: false`, this key MUST be
    # populated in your own Secret named by `secretName`.
    METRICS_AUTH_TOKENS: ""
    # OCI registry auth for PRIVATE template packages (MCP-860). Read
    # by BOTH the controller (talos-registry::sync::registry_auth_from_env
    # for catalog discovery + manifest pulls) AND the worker (OCI WASM
    # pulls at execution time). Anonymous when unset/empty — works for
    # public packages where signing provides trust. For private GHCR
    # packages, set username to the GitHub user and password to a PAT
    # with `read:packages` scope. Empty values fall back to Anonymous
    # (talos-registry/src/sync.rs line ~569: `if !user.is_empty() &&
    # !pass.is_empty()`). Worker reqwest fallback path only supports
    # Basic auth — bearer-token OAuth challenge flow is not implemented
    # (per CLAUDE.md OCI auth model section).
    OCI_REGISTRY_USERNAME: ""
    OCI_REGISTRY_PASSWORD: ""
    # RFC 0010 P2: fleet-shared bearer for dynamic worker Ed25519
    # self-registration (POST /internal/worker-key). OPTIONAL — empty/absent
    # is treated as unset by BOTH consumers (controller: endpoint not
    # mounted, fail-closed; worker: self-registration client no-ops), so
    # this documented default changes nothing. To enable: generate with
    # `openssl rand -hex 32`, set it here, and enable
    # networkPolicy.workerRegistrationIngress. See
    # controller.workerRegistration for the bound-token hardened mode that
    # replaces this shared bearer with single-use per-worker tokens.
    TALOS_WORKER_REGISTRATION_TOKEN: ""
    # Worker AOT cache HMAC (MCP-858). HMAC-SHA256 signature over every
    # compiled-WASM blob the worker caches to disk — stops a tampered
    # AOT artifact from being executed on the next pod restart. REQUIRED
    # in production: when unset (or empty), the worker PANICS at startup
    # with "CRITICAL: TALOS_AOT_HMAC_KEY must be set in production"
    # (worker/src/runtime.rs::aot_key_ring). Must be ≥32 bytes — shorter
    # keys also panic in production. Generate with: openssl rand -hex 32
    # In dev (RUST_ENV != production) it falls back to an ephemeral
    # random key per startup; AOT cache invalidates on every restart.
    # MCP-1210: also wired into the controller deployment as a no-op
    # pass-through so security_audit can attest the key is set + ≥32 bytes
    # after hex decode. The controller does not USE the key — wiring it
    # cross-pod gives operators one place to look and grades the audit.
    TALOS_AOT_HMAC_KEY: ""
    # MinIO credentials — least-privilege per-service users
    MINIO_ROOT_USER: ""
    MINIO_ROOT_PASSWORD: ""
    MINIO_CONTROLLER_USER: ""
    MINIO_CONTROLLER_PASSWORD: ""
    MINIO_WORKER_USER: ""
    MINIO_WORKER_PASSWORD: ""
    # Optional — LLM provider keys. Controller-only; never shipped to worker.
    ANTHROPIC_API_KEY: ""
    OPENAI_API_KEY: ""
    # Optional — embedding provider key (leave empty for local Ollama).
    EMBEDDING_API_URL: ""
    EMBEDDING_API_KEY: ""
    # Optional — OAuth clients. Leave blank to disable the integration.
    GOOGLE_CLIENT_ID: ""
    GOOGLE_CLIENT_SECRET: ""
    GMAIL_CLIENT_ID: ""
    GMAIL_CLIENT_SECRET: ""
    # Google Cloud integration (list projects + Cloud Monitoring alerts).
    # GCP_PUBSUB_AUDIENCE gates the Phase-B push route; leave blank to run
    # read-only. See docs/gcp-push-setup.md.
    GOOGLE_CLOUD_CLIENT_ID: ""
    GOOGLE_CLOUD_CLIENT_SECRET: ""
    GCP_PUBSUB_AUDIENCE: ""
    SLACK_CLIENT_ID: ""
    SLACK_CLIENT_SECRET: ""
    ATLASSIAN_CLIENT_ID: ""
    ATLASSIAN_CLIENT_SECRET: ""
    # RFC 0008 — GitHub App (optional). Set all four to enable the connect flow;
    # leave blank to disable (GITHUB_APP_ID blank = feature off). PRIVATE_KEY is
    # the PEM (PKCS#1 or PKCS#8); WEBHOOK_SECRET is the App's webhook HMAC secret.
    GITHUB_APP_ID: ""
    GITHUB_APP_SLUG: ""
    GITHUB_APP_PRIVATE_KEY: ""
    GITHUB_APP_WEBHOOK_SECRET: ""
    OKTA_DOMAIN: ""
    OKTA_CLIENT_ID: ""
    OKTA_CLIENT_SECRET: ""
    SNYK_CLIENT_ID: ""
    SNYK_CLIENT_SECRET: ""
    # Optional — Admin-only operator endpoints gate. Leave "" in prod.
    ADMIN_SECRET_KEY: ""
    # TOTP config
    TOTP_ISSUER: "Talos"
    # --- Operator-only bearer tokens (MCP-857) ---
    # Both gates fail closed in production when the env is unset or
    # empty (see MCP-591 sweep); leaving these "" on a non-production
    # cluster is fine and disables the corresponding endpoint instead.
    #
    # PROMETHEUS_SCRAPE_TOKEN — shared-secret bearer for GET /metrics.
    # Production: REQUIRED. When unset/empty AND RUST_ENV=production,
    # the handler returns 403 for every scrape (controller/main.rs
    # ::prometheus_metrics_handler). Configure your ServiceMonitor /
    # Prometheus client to add `Authorization: Bearer <token>`.
    # Generate with: openssl rand -hex 32
    PROMETHEUS_SCRAPE_TOKEN: ""
    # REGISTRY_PUBLISH_TOKEN — shared-secret bearer for
    # POST /api/registry/publish (operator-only OCI catalog publish).
    # When unset/empty AND RUST_ENV=production, the endpoint returns
    # 403 with "Catalog publish endpoint disabled — set
    # REGISTRY_PUBLISH_TOKEN to enable" (talos-registry/src/api.rs).
    # Generate with: openssl rand -hex 32 and pass via the publish
    # workflow as `Authorization: Bearer <token>`.
    REGISTRY_PUBLISH_TOKEN: ""

# ----------------------------------------------------------------------------
# Pod-level security context defaults.
# ----------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 10001
  capabilities:
    drop: ["ALL"]
