{{- if and .Values.worker.enabled .Values.worker.autoscaling.enabled -}}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "talos.componentName" (list . "worker") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "talos.componentLabels" (list . "worker") | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "talos.componentName" (list . "worker") }}
  minReplicas: {{ .Values.worker.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.worker.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.worker.autoscaling.targetCPUUtilizationPercentage }}
  # TODO: KEDA-based scaling on NATS queue depth is the real signal for
  # the worker (CPU lags actual backlog by the fuel budget of an
  # in-flight job). When KEDA is available:
  #   - install KEDA's ScaledObject alongside (not inside) this chart,
  #   - disable this HPA (worker.autoscaling.enabled = false),
  #   - let KEDA's generated HPA take over.
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 30
{{- end }}
