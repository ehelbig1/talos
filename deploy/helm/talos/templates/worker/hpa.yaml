{{- if and .Values.worker.enabled .Values.worker.autoscaling.enabled -}}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "talos.componentName" (list . "worker") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "talos.componentLabels" (list . "worker") | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "talos.componentName" (list . "worker") }}
  minReplicas: {{ .Values.worker.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.worker.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.worker.autoscaling.targetCPUUtilizationPercentage }}
  # KEDA-based scaling on NATS queue depth is the real signal for the
  # worker (CPU lags actual backlog by the fuel budget of an in-flight
  # job). It depends on the JetStream DURABLE CONSUMER introduced by the
  # execution-durability work — KEDA's `nats-jetstream` scaler reads the
  # consumer's pending-message count, which does NOT exist while job
  # dispatch uses core-NATS queue groups (ephemeral, no server-side
  # backlog gauge). Once that consumer lands:
  #   - install KEDA's ScaledObject alongside (not inside) this chart,
  #     triggering on the durable consumer's num_pending,
  #   - disable this HPA (worker.autoscaling.enabled = false),
  #   - let KEDA's generated HPA take over.
  # Until then size maxReplicas for peak concurrency (docs/deployment.md
  # → High Availability).
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 30
{{- end }}
