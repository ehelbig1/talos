{{- if and .Values.neo4j.enabled .Values.bootstrapSecret.enabled -}}
# Neo4j ships a separate Secret to isolate graph credentials from the
# main controller bootstrap (which holds Vault tokens + LLM keys).
#
# When bootstrapSecret.enabled=false (production / external-secrets), the
# operator MUST pre-create a Secret named `<release>-talos-neo4j` with
# key `NEO4J_AUTH` in the form "neo4j/<password>" — matching the password
# stored in the external bootstrap Secret under NEO4J_PASSWORD.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "talos.componentName" (list . "neo4j") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "talos.componentLabels" (list . "neo4j") | nindent 4 }}
  annotations:
    helm.sh/resource-policy: "keep"
type: Opaque
stringData:
  # NEO4J_AUTH format: user/password
  NEO4J_AUTH: "{{ .Values.bootstrapSecret.data.NEO4J_USER | default "neo4j" }}/{{ .Values.bootstrapSecret.data.NEO4J_PASSWORD }}"
{{- end }}
