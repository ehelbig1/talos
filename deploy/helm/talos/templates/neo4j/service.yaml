{{- if .Values.neo4j.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "talos.componentName" (list . "neo4j") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "talos.componentLabels" (list . "neo4j") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: bolt
      port: 7687
      targetPort: bolt
    - name: http
      port: 7474
      targetPort: http
  selector:
    {{- include "talos.componentSelectorLabels" (list . "neo4j") | nindent 4 }}
{{- end }}
