{{- if and .Values.nats.enabled .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "talos.componentName" (list . "nats") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "talos.componentLabels" (list . "nats") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "talos.componentSelectorLabels" (list . "nats") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Controller + worker clients, plus peer NATS (for clustering).
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: controller
              app.kubernetes.io/instance: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: worker
              app.kubernetes.io/instance: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: nats
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: {{ .Values.nats.service.clientPort }}
        - protocol: TCP
          port: {{ .Values.nats.service.clusterPort }}
    # MCP-896 (2026-05-14): scrape from a scoped monitoring namespace.
    # Pre-fix this used `podSelector: {}` (any pod in namespace);
    # scoped here for parity with controller + worker even though the
    # monitor port itself exposes only NATS varz/connz/subsz JSON.
    {{- if .Values.networkPolicy.monitoringIngress.enabled }}
    - from:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.monitoringIngress.namespaceSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: {{ .Values.nats.service.monitorPort }}
    {{- end }}
  egress:
    # DNS + NATS peer communication
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: nats
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: {{ .Values.nats.service.clusterPort }}
{{- end }}
