{{- if and .Values.postgres.enabled .Values.postgres.auth.passwordSecret.create -}}
# In-cluster Postgres credentials Secret. Deliberately SEPARATE from
# `talos-bootstrap` so the Postgres pod's mount surface is just one
# small Secret (POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB)
# instead of the full bootstrap blast radius (Vault tokens,
# Anthropic keys, master DEK, etc.).
#
# install.sh creates this Secret out-of-band when TALOS_USE_INTERNAL_
# POSTGRES=yes, mirroring the talos-bootstrap pattern; in that
# flow `passwordSecret.create=false` so the chart only consumes
# the operator-managed Secret by name.
#
# The chart will only emit this Secret on first-install in a flow
# where the operator has explicitly opted into chart-managed
# credentials (`passwordSecret.create=true`) — typically only useful
# for `helm template` smoke tests, since the install script always
# pre-creates the Secret out-of-band for the production path.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "talos.componentName" (list . "postgres-credentials") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "talos.componentLabels" (list . "postgres") | nindent 4 }}
  annotations:
    # Survive `helm uninstall` so the password isn't lost. Same
    # policy as neo4j-auth — losing the password orphans the PVC.
    helm.sh/resource-policy: "keep"
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.auth.username | quote }}
  POSTGRES_PASSWORD: {{ required "postgres.auth.password is required when passwordSecret.create=true" .Values.postgres.auth.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.auth.database | quote }}
{{- end }}
