{{- if .Values.postgres.enabled -}}
# In-cluster Postgres for single-node Talos deployments where running
# a managed Postgres (Neon, RDS, Cloud SQL) isn't desirable. NOT a
# replacement for a managed service in multi-node production —
# single-replica, no streaming replication, no PITR. Backup is via
# daily pg_dump (see postgres/backup-cronjob.yaml).
#
# Image: pgvector/pgvector:pg17 (the pgvector team's official image,
# derived from Debian-based postgres:17). The Talos schema uses
# vector(N) columns so the stock postgres image fails at migration
# 20260406000001 with "type vector does not exist". Postgres user is
# uid/gid 999 in this image (Debian convention) — the StatefulSet has
# its own securityContext block instead of inheriting the chart's
# default 10001. fsGroup: 999 makes the PVC owner match.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "talos.componentName" (list . "postgres") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "talos.componentLabels" (list . "postgres") | nindent 4 }}
  annotations:
    # Run BEFORE the migrations Job (weight 0). The migration Job is a
    # pre-install/pre-upgrade hook itself, so the Postgres resources
    # have to be pre-install/pre-upgrade hooks with a *more negative*
    # weight; otherwise on a fresh install the migration job tries to
    # connect to a Postgres pod that doesn't exist yet.
    #
    # IMPORTANT: Helm only waits for **Job** hooks to reach the
    # Succeeded state — for StatefulSet (or Deployment) hooks it
    # returns the moment the apply call completes, NOT when the pods
    # become Ready. So the weight ordering only ensures the SS object
    # exists before migrations fire; it does NOT ensure pg_isready is
    # green. The migrations Job has an initContainer that polls
    # pg_isready against the postgres Service until it succeeds —
    # that's what actually blocks migrations until Postgres is ready.
    # (see templates/migrations/job.yaml).
    #
    # Side effect: every `helm upgrade` recreates the StatefulSet
    # (~30 s Postgres restart). PVCs from volumeClaimTemplates aren't
    # touched by `helm uninstall` or by hook recreation, so the data
    # survives the bounce. Acceptable for the single-node / homelab
    # path; multi-node production should use an external managed
    # Postgres (`postgres.enabled: false`) anyway.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-11"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  serviceName: {{ include "talos.componentName" (list . "postgres") }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "talos.componentSelectorLabels" (list . "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "talos.componentLabels" (list . "postgres") | nindent 8 }}
      annotations:
        # Re-roll the pod when the postgresql.conf ConfigMap changes.
        # `checksum/config` is the standard Helm chart idiom — no
        # equivalent for the StatefulSet's own values changes (those
        # cause a spec diff which triggers a rollout naturally).
        checksum/config: {{ include (print $.Template.BasePath "/postgres/configmap.yaml") . | sha256sum }}
        # Re-roll when the credentials secret content rotates. The
        # Postgres container caches POSTGRES_PASSWORD at initdb time
        # (first install) and at server-start authentication time;
        # rotating without a restart leaves the running pod accepting
        # the OLD password while every new client uses the NEW one
        # — silent auth failures everywhere. install.sh §6 keeps the
        # secret out of the bootstrap blob so each rotation hashes
        # independently.
        checksum/postgres-credentials-data: {{ include "talos.secretChecksum" (dict "ns" .Release.Namespace "name" (include "talos.componentName" (list . "postgres-credentials"))) }}
    spec:
      {{- include "talos.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: {{ include "talos.image" .Values.postgres.image }}
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            # postgres needs to write to PGDATA, /var/run/postgresql,
            # and /tmp — all backed by writable mounts below. The
            # container root FS itself is read-only.
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop: ["ALL"]
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "talos.componentName" (list . "postgres-credentials") }}
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "talos.componentName" (list . "postgres-credentials") }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "talos.componentName" (list . "postgres-credentials") }}
                  key: POSTGRES_DB
            # Force scram-sha-256 from initdb so the cluster is never
            # built with the legacy `md5` default. Matches
            # password_encryption=scram-sha-256 in postgresql.conf.
            - name: POSTGRES_HOST_AUTH_METHOD
              value: "scram-sha-256"
            - name: POSTGRES_INITDB_ARGS
              value: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
            # Putting PGDATA in a subdirectory of the PVC mount avoids
            # the "data directory is lost+found" gotcha some PV
            # provisioners cause (k3s local-path doesn't, but the
            # subdir pattern is universally safe).
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          # initdb on first boot can take 10-30s on a slow disk; give
          # the startup probe a generous budget before kubelet falls
          # through to liveness. Pattern mirrors neo4j's
          # MCP-895 fix.
          startupProbe:
            exec:
              # Wrap in `sh -c` so PATH lookup finds pg_isready regardless of
              # whether the image installs it at /usr/local/bin (Alpine) or
              # /usr/bin (Debian/pgvector). The kubelet's exec syscall doesn't
              # do PATH resolution; the shell wrapper does.
              command:
                - sh
                - -c
                - "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB -h 127.0.0.1"
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            exec:
              # Wrap in `sh -c` so PATH lookup finds pg_isready regardless of
              # whether the image installs it at /usr/local/bin (Alpine) or
              # /usr/bin (Debian/pgvector). The kubelet's exec syscall doesn't
              # do PATH resolution; the shell wrapper does.
              command:
                - sh
                - -c
                - "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB -h 127.0.0.1"
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              # Wrap in `sh -c` so PATH lookup finds pg_isready regardless of
              # whether the image installs it at /usr/local/bin (Alpine) or
              # /usr/bin (Debian/pgvector). The kubelet's exec syscall doesn't
              # do PATH resolution; the shell wrapper does.
              command:
                - sh
                - -c
                - "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB -h 127.0.0.1"
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            # The official image's entrypoint expects to write a unix
            # socket at /var/run/postgresql; that path is on the
            # read-only root FS by default.
            - name: run
              mountPath: /var/run/postgresql
            # Postgres' temporary files (sorts, hashes spilled from
            # work_mem) go under PGDATA already, but the entrypoint
            # uses /tmp for its `mktemp -d`. Cheap to give it an
            # emptyDir.
            - name: tmp
              mountPath: /tmp
            - name: config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
              readOnly: true
            {{- if .Values.tls.inCluster.enabled }}
            # In-transit TLS cert+key (PR #243). postgresql.conf points
            # ssl_cert_file/ssl_key_file here. fsGroup 999 makes the mounted
            # files root:999; defaultMode 0640 lets the postgres uid (999, in
            # the group) read them while satisfying Postgres' key-perm check
            # (root-owned, no group/world write).
            - name: tls
              mountPath: /etc/postgresql/tls
              readOnly: true
            {{- end }}
          # Override the default entrypoint's config path so postgres
          # picks up our tuned values. The official image's entrypoint
          # (docker-entrypoint.sh) honours `-c config_file=...` on the
          # postgres command line.
          args:
            - postgres
            - -c
            - config_file=/etc/postgresql/postgresql.conf
      volumes:
        - name: run
          emptyDir:
            sizeLimit: "16Mi"
        - name: tmp
          emptyDir:
            sizeLimit: "256Mi"
        - name: config
          configMap:
            name: {{ include "talos.componentName" (list . "postgres-config") }}
        {{- if .Values.tls.inCluster.enabled }}
        - name: tls
          secret:
            secretName: {{ include "talos.componentName" (list . "postgres-tls") }}
            defaultMode: 0640
        {{- end }}
            items:
              - key: postgresql.conf
                path: postgresql.conf
        {{- if not .Values.postgres.persistence.enabled }}
        # Same emptyDir-fallback shape as neo4j (see MCP-806 comment in
        # neo4j/statefulset.yaml). For ANY non-test deployment leave
        # postgres.persistence.enabled=true — pod restarts wipe the
        # entire database otherwise.
        - name: data
          emptyDir:
            sizeLimit: "1Gi"
        {{- end }}
  {{- if .Values.postgres.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "talos.componentLabels" (list . "postgres") | nindent 10 }}
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.postgres.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.persistence.size }}
  {{- end }}
{{- end }}
