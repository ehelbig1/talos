{{- if and .Values.frontend.enabled .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "talos.componentName" (list . "frontend") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "talos.componentLabels" (list . "frontend") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "talos.componentSelectorLabels" (list . "frontend") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Ingress controller only
    - from:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: {{ .Values.frontend.service.port }}
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Controller (via internal service) — this is the only backend the
    # frontend's nginx proxies to.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: controller
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: {{ .Values.controller.service.port }}
{{- end }}
