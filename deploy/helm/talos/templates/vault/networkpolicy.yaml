{{- if and .Values.vault.enabled .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "talos.componentName" (list . "vault") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "talos.componentLabels" (list . "vault") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "talos.componentSelectorLabels" (list . "vault") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Controller talks transit; vault-init Job talks unseal. Worker has
    # NO direct Vault access — all secret reads route through the
    # controller's signed NATS-RPC path.
    #
    # MCP-897 (2026-05-14): the vault-init job pod template inherits
    # `talos.componentLabels` with component=vault (see init-job.yaml
    # spec.template.metadata.labels), so it is matched by the second
    # selector below. A previous third selector at this position used
    # `part-of: talos + instance: <release>` to "match the init job"
    # — but those labels are present on EVERY workload in the chart
    # (controller, worker, frontend, neo4j, nats, minio, init job),
    # silently granting worker/neo4j/nats/minio/frontend direct
    # Vault:8200 access in direct contradiction of the design
    # comment above. The over-broad rule was redundant (init-job is
    # already covered by the component=vault entry) AND wider blast
    # radius than intended — removed.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: controller
              app.kubernetes.io/instance: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: vault
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 8200
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
