{{- if and .Values.vault.enabled .Values.vault.init.enabled -}}
{{/*
  kubectl image for the secret-patcher sidecar. Default switched from
  `bitnami/kubectl:1.31` to `rancher/kubectl:v1.31.4` in May-2026:
  Bitnami changed their free-image policy in late 2025 and the public
  `bitnami/kubectl` tag now returns "manifest unknown" / image-pull
  errors, leaving the vault-init Job stuck in ImagePullBackOff
  indefinitely — which in turn blocks the controller from starting
  (VAULT_TOKEN is never patched out of its `__pending_vault_init__`
  placeholder). rancher/kubectl is free, mirrors k8s minor versions
  in lockstep, and aligns with the k3s the chart targets. Operators
  on a paid Bitnami subscription can override via
  `vault.init.kubectlImage` in values.
*/}}
{{- $kubectlImage := .Values.vault.init.kubectlImage | default (dict "repository" "rancher/kubectl" "tag" "v1.31.4" "pullPolicy" "IfNotPresent") -}}
{{- $bootstrapSecret := include "talos.bootstrapSecretName" . -}}
{{- $controllerDeploy := include "talos.componentName" (list . "controller") -}}
{{- $kekKeyName := .Values.controller.env.VAULT_TRANSIT_KEY_NAME | default "talos-kek" -}}
# -----------------------------------------------------------------------------
# Vault init Job — two-phase bootstrap.
#
# Phase 1 (initContainer `vault-bootstrap`):
#   - Initialize Vault on fresh storage; otherwise unseal with the stored
#     root key from bootstrap.json on the Vault PVC.
#   - Enable the transit engine, create the named KEK key.
#   - Write the `talos-controller` policy (transit/encrypt + decrypt + read
#     against the KEK key only — least privilege).
#   - Mint an orphan, periodic `talos-controller` token under that policy.
#   - Drop the token to /tmp/talos-controller-token (shared emptyDir).
#
# Phase 2 (container `secret-patcher`):
#   - Read the current VAULT_TOKEN from the bootstrap Secret.
#   - If it's a known placeholder (`__pending_vault_init__`, `dev-root`,
#     or empty), patch the Secret with the freshly-minted least-privilege
#     token AND trigger a controller rollout so the new token takes effect.
#   - If it's an operator-set value, leave it alone (avoid clobbering
#     custom rotations performed via direct kubectl patch).
#
# Phase 1 produces the token in-memory only; Phase 2 is the single point
# that touches Kubernetes API. Splitting the phases lets us keep the
# Vault container minimal (no curl/kubectl install needed) and the
# patcher container minimal (no Vault API surface).
#
# bootstrap.json lives on the Vault data PVC, NOT in a Kubernetes Secret —
# that would tie key material to the Helm release lifecycle (helm uninstall
# would revoke the operator's ability to unseal). Operators running a
# proper HA Vault cluster will replace this job with Shamir-split keys
# held by distinct humans.
# -----------------------------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "talos.componentName" (list . "vault-init") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "talos.componentLabels" (list . "vault") | nindent 4 }}
  annotations:
    # NOT a Helm hook — runs as a regular Job alongside the Vault
    # StatefulSet during apply. Hooks would only run after `--wait`
    # succeeds, but the controller can't become Ready until Vault is
    # unsealed AND the bootstrap Secret has a real token, both of which
    # this Job provides. Running as a plain Job lets it race against
    # Vault startup; the script polls `vault status` until it gets a
    # response, so order doesn't matter.
    #
    # On `helm upgrade` with an unchanged Job spec, this is a no-op.
    # If the Vault image digest changes (or you need to force a re-run),
    # `kubectl -n talos delete job talos-vault-init` between uninstall
    # and install — Vault's bootstrap.json on the PVC means the new Job
    # will pick up the existing unseal key and just re-unseal.
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "talos.componentLabels" (list . "vault") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "talos.componentName" (list . "vault-init") }}
      restartPolicy: OnFailure
      {{- include "talos.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "talos.podSecurityContext" . | nindent 8 }}
      initContainers:
        - name: vault-bootstrap
          image: {{ include "talos.image" .Values.vault.image }}
          imagePullPolicy: {{ .Values.vault.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop: ["ALL"]
          env:
            - name: VAULT_ADDR
              value: {{ include "talos.vaultAddr" . | quote }}
          # MCP-898 (2026-05-14): explicit resources prevent BestEffort
          # QoS. An OOM-kill mid-init can leave Vault initialized with
          # the unseal key lost (parsed in shell, not persisted before
          # parse) → cluster permanently broken; resources defaults
          # are tuned for `vault operator init`+`unseal`+a few CLI ops.
          resources:
            {{- toYaml .Values.vault.init.resources.bootstrap | nindent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              BOOTSTRAP=/vault/file/bootstrap.json
              TOKEN_OUT=/tmp/talos-controller-token

              # Wait for Vault's HTTP API to be up (listens even while sealed).
              for i in $(seq 1 60); do
                if vault status >/dev/null 2>&1 || [ $? -eq 2 ]; then
                  break
                fi
                echo "vault-init: waiting for vault to listen ($i/60)..."
                sleep 2
              done

              INITIALIZED=$(vault status -format=json 2>&1 | grep -o '"initialized":[[:space:]]*true' || true)
              if [ -z "$INITIALIZED" ]; then
                echo "vault-init: initializing fresh Vault storage"
                vault operator init -key-shares=1 -key-threshold=1 -format=json > "$BOOTSTRAP"
                chmod 600 "$BOOTSTRAP"
              else
                echo "vault-init: existing Vault storage detected"
                if [ ! -f "$BOOTSTRAP" ]; then
                  echo "vault-init: ERROR — Vault is initialized but $BOOTSTRAP is missing."
                  echo "vault-init: cannot unseal. Either restore the bootstrap file or"
                  echo "vault-init: delete the Vault PVC (data loss) and re-install."
                  exit 1
                fi
              fi

              # Parse first unseal key and root token without depending on jq.
              UNSEAL_KEY=$(awk '/"unseal_keys_b64"/{f=1;next} /\]/{f=0} f' "$BOOTSTRAP" | sed -n 's/.*"\([^"]*\)".*/\1/p' | head -1)
              ROOT_TOKEN=$(sed -n 's/.*"root_token"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "$BOOTSTRAP" | head -1)

              if [ -z "$UNSEAL_KEY" ] || [ -z "$ROOT_TOKEN" ]; then
                echo "vault-init: ERROR — could not parse unseal key or root token from $BOOTSTRAP"
                exit 1
              fi

              SEALED=$(vault status -format=json 2>&1 | grep -o '"sealed":[[:space:]]*true' || true)
              if [ -n "$SEALED" ]; then
                echo "vault-init: unsealing"
                vault operator unseal "$UNSEAL_KEY" >/dev/null
              fi

              export VAULT_TOKEN="$ROOT_TOKEN"

              # Enable the transit engine (no-op if already enabled).
              vault secrets enable -path=transit transit 2>/dev/null || true
              # Create the named KEK key (no-op if it already exists).
              vault write -f transit/keys/{{ $kekKeyName }} 2>/dev/null || true
              vault read transit/keys/{{ $kekKeyName }}

              # Write the least-privilege controller policy. Idempotent —
              # `vault policy write` upserts. The policy grants ONLY the
              # transit operations the controller needs against the KEK
              # key; no token mint, no key rotation, no other engines.
              vault policy write talos-controller - <<POLICY
              path "transit/encrypt/{{ $kekKeyName }}" { capabilities = ["update"] }
              path "transit/decrypt/{{ $kekKeyName }}" { capabilities = ["update"] }
              path "transit/keys/{{ $kekKeyName }}"    { capabilities = ["read"] }
              POLICY

              # Mint an orphan periodic token under the new policy.
              # -orphan: not revoked when its parent (root) is revoked.
              # -period=768h: token auto-renews every 32 days as long as
              # the controller is calling Vault; if the controller goes
              # silent for >32d the token expires (operator must re-run
              # this Job to mint a fresh one).
              # No -id pin: rely on the random token id; the value lands
              # in the bootstrap Secret, which is the only place the
              # controller reads it from.
              CONTROLLER_TOKEN=$(vault token create \
                -policy=talos-controller \
                -period=768h \
                -orphan \
                -display-name=talos-controller \
                -format=json \
                | sed -n 's/.*"client_token"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' \
                | head -1)

              if [ -z "$CONTROLLER_TOKEN" ]; then
                echo "vault-init: ERROR — failed to mint talos-controller token"
                exit 1
              fi

              # Hand off to the secret-patcher container via /tmp.
              # readOnlyRootFilesystem is true on this container, so /tmp
              # is the shared writable surface (emptyDir mount below).
              printf '%s' "$CONTROLLER_TOKEN" > "$TOKEN_OUT"
              chmod 600 "$TOKEN_OUT"
              echo "vault-init: talos-controller token minted; handing off to secret-patcher"
          volumeMounts:
            - name: data
              mountPath: /vault/file
            - name: tmp
              mountPath: /tmp
      containers:
        - name: secret-patcher
          image: {{ printf "%s:%s" $kubectlImage.repository $kubectlImage.tag | quote }}
          imagePullPolicy: {{ $kubectlImage.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop: ["ALL"]
          env:
            - name: BOOTSTRAP_SECRET
              value: {{ $bootstrapSecret | quote }}
            - name: CONTROLLER_DEPLOY
              value: {{ $controllerDeploy | quote }}
            - name: NAMESPACE
              value: {{ .Release.Namespace | quote }}
          # MCP-898 (2026-05-14): explicit resources prevent BestEffort
          # QoS for the kubectl/bash secret-patcher step. If this is
          # OOM-killed mid-flight, Vault is already initialized but
          # the bootstrap Secret VAULT_TOKEN is still the placeholder
          # → controller can't authenticate, manual recovery needed.
          resources:
            {{- toYaml .Values.vault.init.resources.secretPatcher | nindent 12 }}
          command:
            - /bin/bash
            - -c
            - |
              set -eu
              TOKEN_FILE=/tmp/talos-controller-token

              if [ ! -s "$TOKEN_FILE" ]; then
                echo "secret-patcher: ERROR — $TOKEN_FILE missing or empty (vault-bootstrap initContainer must have failed)"
                exit 1
              fi
              NEW_TOKEN=$(cat "$TOKEN_FILE")

              # Read the current VAULT_TOKEN from the bootstrap Secret. If
              # the key isn't present (older chart, manually-stripped
              # secret), treat it as empty for the placeholder check.
              CURRENT_B64=$(kubectl -n "$NAMESPACE" get secret "$BOOTSTRAP_SECRET" \
                -o jsonpath='{.data.VAULT_TOKEN}' 2>/dev/null || true)
              if [ -n "$CURRENT_B64" ]; then
                CURRENT=$(printf '%s' "$CURRENT_B64" | base64 -d 2>/dev/null || true)
              else
                CURRENT=""
              fi

              # Only replace placeholders. An operator who manually rotated
              # to a custom token (e.g. AppRole-derived) gets to keep it.
              case "$CURRENT" in
                __pending_vault_init__|dev-root|"")
                  echo "secret-patcher: VAULT_TOKEN is a placeholder ('${CURRENT:-<empty>}'); patching with talos-controller token"
                  NEW_B64=$(printf '%s' "$NEW_TOKEN" | base64 | tr -d '\n')
                  PAYLOAD=$(printf '{"data":{"VAULT_TOKEN":"%s"}}' "$NEW_B64")
                  kubectl -n "$NAMESPACE" patch secret "$BOOTSTRAP_SECRET" \
                    --type=merge -p "$PAYLOAD" >/dev/null
                  echo "secret-patcher: bootstrap secret patched"

                  # Trigger a controller rollout so the new pod picks up
                  # the new VAULT_TOKEN. envFromSecret reads at pod start;
                  # rotating the secret without a rollout leaves running
                  # pods on the old (placeholder) value. Tolerate the
                  # deployment not existing yet (first install: helm may
                  # still be applying resources in parallel) — the
                  # controller will read the patched secret on its first
                  # pod creation regardless.
                  if kubectl -n "$NAMESPACE" get deployment "$CONTROLLER_DEPLOY" >/dev/null 2>&1; then
                    NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                    PATCH=$(printf '{"spec":{"template":{"metadata":{"annotations":{"kubectl.kubernetes.io/restartedAt":"%s"}}}}}' "$NOW")
                    kubectl -n "$NAMESPACE" patch deployment "$CONTROLLER_DEPLOY" \
                      --type=strategic -p "$PATCH" >/dev/null
                    echo "secret-patcher: controller rollout triggered"
                  else
                    echo "secret-patcher: controller Deployment not yet present; skipping rollout (controller will pick up the patched secret on first start)"
                  fi
                  ;;
                *)
                  echo "secret-patcher: VAULT_TOKEN is operator-set (not a placeholder); leaving alone"
                  ;;
              esac
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            # Attach the same PVC the Vault StatefulSet uses. Helm's
            # PVC-per-ordinal convention means replica-0's PVC is named
            # `data-<stsname>-0`. A single-replica Vault means this is
            # always the right target; multi-replica Vault setups should
            # not use this init pattern.
            claimName: data-{{ include "talos.componentName" (list . "vault") }}-0
        - name: tmp
          emptyDir:
            sizeLimit: "32Mi"
{{- end }}
