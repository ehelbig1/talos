{{- if and .Values.vault.enabled .Values.vault.init.enabled -}}
{{- $bootstrapSecret := include "talos.bootstrapSecretName" . -}}
{{- $controllerDeploy := include "talos.componentName" (list . "controller") -}}
{{- $vaultPod := printf "%s-0" (include "talos.componentName" (list . "vault")) -}}
# Scoped Role for the vault-init Job.
#
# Permissions, each pinned to a single resource by name so a
# compromise of this SA token can't pivot to anything else in the
# namespace:
#
#   - get + patch on the bootstrap Secret (rotate VAULT_TOKEN
#     placeholder → freshly-minted talos-controller token).
#   - get + patch on the controller Deployment (trigger rollout so
#     the new VAULT_TOKEN takes effect; envFromSecret reads at pod
#     start).
#   - get on the vault Pod (poll for readiness before exec).
#   - create on the vault Pod's `exec` subresource (drive all
#     Vault-side operations — init / unseal / policy / token mint —
#     via `kubectl exec` against the running Vault pod instead of
#     dual-container handoff). This is the May-2026 rewrite
#     (vault/init-job.yaml header comment) that collapsed the
#     5-failure-mode dual-container shape into a single runner.
#
# pods/exec is the only "broad-looking" verb here. resourceNames
# pinning on the parent pod restricts it to exactly the one
# `talos-vault-0` pod — a compromised SA token cannot exec into the
# controller, frontend, or any other in-namespace pod.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "talos.componentName" (list . "vault-init") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "talos.componentLabels" (list . "vault") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ $bootstrapSecret | quote }}
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames:
      - {{ $controllerDeploy | quote }}
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    resourceNames:
      - {{ $vaultPod | quote }}
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    resourceNames:
      - {{ $vaultPod | quote }}
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "talos.componentName" (list . "vault-init") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "talos.componentLabels" (list . "vault") | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "talos.componentName" (list . "vault-init") }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "talos.componentName" (list . "vault-init") }}
{{- end }}
