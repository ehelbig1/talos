{{- if and .Values.controller.enabled .Values.bootstrapSecret.enabled -}}
# -------------------------------------------------------------------------
# Bootstrap Secret
#
# This Secret is created by the chart on first install from values.yaml
# `bootstrapSecret.data`. For PRODUCTION:
#
#   - Set `bootstrapSecret.enabled: false` in your values.
#   - Configure external-secrets.io (or SOPS / sealed-secrets) to
#     populate a Secret with the same name + keys in-cluster.
#   - The controller/worker Deployments reference this Secret by name;
#     they do NOT require it be chart-owned.
#
# WARNING: while bootstrapSecret.enabled is true, the plaintext values
# you put in values.yaml end up in `helm get values` output. Treat the
# values file as sensitive until you migrate to external-secrets.
# -------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "talos.bootstrapSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "talos.componentLabels" (list . "controller") | nindent 4 }}
  annotations:
    # Signal to external-secrets operator (if you adopt it later) to
    # take ownership of this Secret without Helm deleting it on uninstall.
    helm.sh/resource-policy: "keep"
type: Opaque
stringData:
  {{- range $k, $v := .Values.bootstrapSecret.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
