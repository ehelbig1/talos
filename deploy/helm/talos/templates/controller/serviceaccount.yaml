{{- if and .Values.controller.enabled .Values.controller.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "talos.componentName" (list . "controller") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "talos.componentLabels" (list . "controller") | nindent 4 }}
  {{- with .Values.controller.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# The controller does not call the Kubernetes API at runtime (see
# templates/controller/rbac.yaml — no Role/RoleBinding shipped). With no
# legitimate API caller, mounting the SA token is a credential the pod
# carries for free; a pod compromise gets a token usable against any
# default-bound RBAC the cluster might add later. Default-deny is safer.
automountServiceAccountToken: false
{{- end }}
