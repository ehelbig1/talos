{{- if .Values.migrations.enabled -}}
# -----------------------------------------------------------------------------
# sqlx migrate — one-shot Job run on every install and upgrade.
#
# Runs as a Helm pre-install / pre-upgrade hook at weight 0 so it
# completes before the controller Deployment rolls out against an
# unmigrated schema. Uses the same image as the controller (which bundles
# the sqlx CLI + the /app/migrations directory).
# -----------------------------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "talos.componentName" (list . "migrations") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "talos.componentLabels" (list . "migrations") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrations.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: 1200
  template:
    metadata:
      labels:
        {{- include "talos.componentLabels" (list . "migrations") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      {{- include "talos.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "talos.podSecurityContext" . | nindent 8 }}
      {{- if .Values.postgres.enabled }}
      # Wait for the in-cluster Postgres pod to be Ready before
      # sqlx migrate runs. Helm's hook ordering ensures the postgres
      # StatefulSet OBJECT exists before this Job (the StatefulSet's
      # hook-weight=-11 < this Job's hook-weight=0), but Helm does
      # NOT wait for non-Job hook resources to reach Ready before
      # moving on. So without this initContainer, migrations fires
      # against a postgres pod that's still in `initdb` and gets
      # connection refused (kube-proxy RSTs because the Service has
      # no Endpoints yet).
      #
      # Uses the same image as the postgres pod so pg_isready is
      # guaranteed available, and avoids a separate image pull.
      # Wrapped in `sh -c` so PATH lookup finds pg_isready regardless
      # of distro (alpine /usr/local/bin vs debian /usr/bin).
      # Polls every 2 s, with no internal timeout — relies on the
      # Job's `activeDeadlineSeconds` (default 900 s) as the outer
      # bound. If Postgres never comes up, the Job fails on that
      # deadline rather than looping forever.
      initContainers:
        - name: wait-for-postgres
          image: {{ include "talos.image" .Values.postgres.image }}
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop: ["ALL"]
          env:
            - name: PGHOST
              value: {{ include "talos.componentName" (list . "postgres") | quote }}
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ include "talos.componentName" (list . "postgres-credentials") }}
                  key: POSTGRES_USER
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "talos.componentName" (list . "postgres-credentials") }}
                  key: POSTGRES_DB
          command:
            - sh
            - -c
            - |
              echo "waiting for postgres at ${PGHOST}:${PGPORT}…"
              i=0
              until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" -q; do
                  i=$((i + 1))
                  if [ $((i % 15)) -eq 0 ]; then
                      echo "still waiting (${i} polls)…"
                  fi
                  sleep 2
              done
              echo "postgres ready after ${i} polls"
      {{- end }}
      containers:
        - name: migrate
          image: {{- if .Values.migrations.image.repository }}
            {{ include "talos.image" .Values.migrations.image }}
          {{- else }}
            {{ include "talos.image" .Values.controller.image }}
          {{- end }}
          imagePullPolicy: IfNotPresent
          securityContext:
            {{- include "talos.containerSecurityContext" . | nindent 12 }}
          command:
            - /usr/local/cargo/bin/sqlx
          args:
            - migrate
            - run
            - --source
            - /app/migrations
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "talos.bootstrapSecretName" . }}
                  key: DATABASE_URL
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: "128Mi"
{{- end }}
