{{- if .Values.monitoring.prometheusRule.enabled -}}
{{- /*
  2026-05-28: ship the Talos alert rules as a PrometheusRule CRD so they
  deploy with the release instead of via a manual `kubectl create
  configmap` + hand-authored CRD. Requires the monitoring.coreos.com/v1
  CRDs (kube-prometheus-stack / prometheus-operator) — gated behind
  monitoring.prometheusRule.enabled (off by default) so the chart still
  renders on clusters without them.

  SINGLE SOURCE OF TRUTH: the rule groups are embedded verbatim from
  files/alerts.yaml via `.Files.Get` (NOT `tpl` — the alert annotations
  contain Prometheus template expressions like the dollar-value and
  dollar-labels variables that must pass through untouched).
  deploy/observability/alerts.yaml is a symlink to that same file, so the
  non-Helm Prometheus path and this CRD never drift.

  NOTE: this block uses Helm comment syntax, not YAML `#` comments —
  Helm evaluates `{{ }}` even inside `#` lines (templating runs before
  YAML parsing), so a literal Prometheus `{{ $value }}` in a `#` comment
  would blow up with "undefined variable".
*/ -}}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "talos.componentName" (list . "alerts") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "talos.labels" . | nindent 4 }}
    {{- with .Values.monitoring.prometheusRule.extraLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
{{ .Files.Get "files/alerts.yaml" | indent 2 }}
{{- end }}
