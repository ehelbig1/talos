[package]
name = "talos-github-connect"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
anyhow.workspace = true
async-trait = "0.1"
axum = { version = "0.8", features = ["json"] }
chrono.workspace = true
serde.workspace = true
serde_json.workspace = true
sqlx = { version = "0.8", default-features = false, features = ["postgres", "runtime-tokio-rustls", "macros", "uuid", "json", "chrono"] }
talos-config = { path = "../talos-config" }
talos-github = { path = "../talos-github", features = ["client"] }
talos-github-repository = { path = "../talos-github-repository" }
talos-oauth = { path = "../talos-oauth" }
talos-workflow-engine-core = { path = "../talos-workflow-engine-core" }
tracing.workspace = true
urlencoding = "2.1"
uuid.workspace = true
zeroize = "1.8"

[lints]
workspace = true
